# YAML Playground — Multi-agent tabbed UI, no Python needed
#
# What's New (vs chat-yaml-profiles/):
#   • style: agents — activates tabbed AgentUILayout (sidebar with Agents/History tabs)
#   • Multiple agent profiles with different system prompts
#   • Per-agent starter messages
#
# Run:
#   aiui run chat.yaml --style agents
#
# CLI parity:
#   aiui health-check
#   aiui provider agents
#   aiui sessions list

name: AI Playground
instructions: |
  You are a helpful, concise assistant in a multi-agent playground.
  Answer questions clearly and directly.

style: agents

profiles:
  - name: "General Assistant"
    description: "A helpful general-purpose assistant"
    icon: "🤖"
    default: true
    instructions: |
      You are a helpful, concise assistant. Answer questions clearly
      and directly. Provide balanced, well-rounded responses.
  - name: "Code Expert"
    description: "Specialized in writing and debugging code"
    icon: "💻"
    instructions: |
      You are a senior software engineer. Focus on code quality,
      best practices, and technical accuracy. Always include working examples.
  - name: "Data Analyst"
    description: "Analyzes data and provides insights"
    icon: "📊"
    instructions: |
      You are a data scientist. Think analytically, suggest appropriate
      visualizations, and provide data-driven insights. Be methodical and precise.
  - name: "Creative Writer"
    description: "Helps with creative writing and content"
    icon: "✍️"
    instructions: |
      You are a creative writer. Use vivid language, storytelling techniques,
      and engaging narrative structures. Be imaginative and expressive.

welcome: "👋 Welcome to the AI Playground! Select an agent from the sidebar to get started."

starters:
  - label: "What can you do?"
    message: "What are your capabilities?"
    icon: "❓"
  - label: "Write code"
    message: "Write a Python function to calculate Fibonacci numbers"
    icon: "💻"
  - label: "Analyze data"
    message: "How would you approach analyzing customer churn data?"
    icon: "📊"
  - label: "Write a story"
    message: "Write a short story about an AI that learns to dream"
    icon: "✍️"
