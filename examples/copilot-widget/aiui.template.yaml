# PraisonAIUI Copilot Widget Configuration
# This adds a floating chat widget to a docs site

site:
  title: Documentation Site
  description: A documentation site with AI copilot
  theme:
    preset: zinc
    darkMode: true
    radius: md

# Keep docs style but enable chat widget
style: docs

# Chat configuration
chat:
  enabled: true
  name: Doc Assistant
  starters:
    - label: "Getting started"
      message: "How do I get started?"
      icon: "🚀"
    - label: "Installation"
      message: "How do I install this?"
      icon: "📦"
  features:
    streaming: true
    reasoning: true

# Floating widget in bottom-right corner
layout:
  mode: bottom-right
  width: "380px"
  height: "500px"

# Documentation content
content:
  docs_dir: docs
