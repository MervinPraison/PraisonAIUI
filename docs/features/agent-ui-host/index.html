  <div id="root"><noscript><h1>Agent UI host — modular dashboard shell</h1>
<p>PraisonAIUI can host any AI agent backend behind a **modular dashboard shell**: pages, views, layout components, optional plugins, and branding — without forking the frontend.</p>
<h2>Architecture</h2>
<p>**Extension priority** (first match wins):</p>
<p>1. `window.aiui.registerView(pageId, …)`</p>
<p>2. Dashboard manifest plugins (`dashboard-plugins/*/manifest.json`)</p>
<p>3. Built-in view modules (`plugins/views/*.js` via `BUILTIN_VIEWS`)</p>
<p>4. Server `aiui.layout()` JSON from `@aiui.page()`</p>
<p>5. `window.aiui.registerComponent(type, …)` inside `renderComponent`</p>
<p>6. Generic JSON fallback viewer</p>
<h2>Video Studio</h2>
<p>For YAML scene authoring with an external PraisonAI Video engine, see [Video Studio](video-studio.md).</p>
<h2>Quick start (external agent)</h2>
<p>See [`examples/python/external-agent-dashboard/app.py`](../../examples/python/external-agent-dashboard/app.py).</p>
<h2>`window.aiui` extension API</h2>
<p>| API | Purpose |</p>
<p>|-----|---------|</p>
<p>| `version` | Shell protocol version (`'1'`) |</p>
<p>| `registerView(pageId, renderFn, cleanup?)` | Replace or add a full page renderer |</p>
<p>| `registerComponent(type, renderFn)` | Override a layout component type |</p>
<p>| `registerSurfaceRenderer(surfaceId, renderFn)` | Custom A2UI surface renderer |</p>
<p>| `selectPage(pageId)` | Navigate programmatically (e.g. open full canvas) |</p>
<p>| `registerSlot(name, renderFn)` | Inject DOM into named slots |</p>
<p>| `sdk.fetchJSON(url, opts?)` | Authenticated fetch helper |</p>
<p>| `sdk.el(tag, attrs?, children?)` | Small DOM builder |</p>
<p>| `sdk.themeVar('--db-*', fallback?)` | Read theme CSS variables |</p>
<p>| `sdk.createBoard(root, { fetch, pollMs? })` | Live board with optional polling |</p>
<h3>Slots</h3>
<p>| Slot id | Where it renders |</p>
<p>|---------|------------------|</p>
<p>| `shell:sidebar:footer` | Bottom of sidebar (default: health hint) |</p>
<p>| `page:{pageId}:toolbar` | Right side of page header |</p>
<p>Register only what you need; omit slots you do not use.</p>
<h2>Layout components (Python → JS)</h2>
<p>Define pages with `@aiui.page()` returning `aiui.layout([...])`. Types are implemented once in [`ui.py`](../../src/praisonaiui/ui.py) and [`dashboard.js`](../../src/praisonaiui/templates/frontend/plugins/dashboard.js).</p>
<p>**Kanban / board:** use `aiui.board(columns=[...])`. Columns contain `id`, `title`, and `cards` (from `aiui.card()` or dicts). The shell renders via `renderBoard`, composing existing card renderers (DRY).</p>
<h2>A2UI surfaces (agent-driven UI)</h2>
<p>Three tiers work together:</p>
<p>| Tier | Mechanism | Use case |</p>
<p>|------|-----------|----------|</p>
<p>| Dashboard | `aiui.layout()` → `_components` | Python-authored pages |</p>
<p>| A2UI | `send_a2ui_messages` → `SurfaceHost` | Agent-generated UI in chat/canvas |</p>
<p>| AG-UI | `POST /agui` SSE | CopilotKit / external clients |</p>
<p>Register an empty canvas page:</p>
<p>Or use `@aiui.surface_action("main")` for button callbacks. See [`examples/python/29-a2ui-canvas/`](../../examples/python/29-a2ui-canvas/app.py).</p>
<h3>Chat + Canvas same-window preview</h3>
<p>Three dashboard modes:</p>
<p>| Page | Route | Purpose |</p>
<p>|------|-------|---------|</p>
<p>| `chat-canvas` | `/chat-canvas` | **Split view** — chat left, live A2UI preview right |</p>
<p>| `chat` | `/chat` | Vanilla chat only (unchanged) |</p>
<p>| `canvas` | `/canvas` | Full-page surface workspace |</p>
<p>Enable preview settings and list the combined page:</p>
<p>`/ui-config.json` exposes `chat.preview: { enabled, surfaceId, width }` for the preview panel.</p>
<p>Shared modules: `surface-utils.js` (render, load, WebSocket, actions), `canvas-preview.js` (preview panel), `a2ui-mapper.js` (default DOM mapper). Override rendering with `registerSurfaceRenderer("main", fn)`.</p>
<h2>Optional dashboard modules</h2>
<p>Load heavy built-ins only when listed:</p>
<p>This adds `jobs.js`, `auth.js`, or `api.js` to the plugin chain and maps them in `BUILTIN_VIEWS`. `feedback` is always available as a built-in view when the page is enabled.</p>
<h2>Third-party dashboard plugins</h2>
<p>Place folders under:</p>
<li>`~/.praisonai/dashboard-plugins/{name}/`</li>
<li>Or `src/praisonaiui/templates/frontend/dashboard-plugins/{name}/` (shipped examples)</li>
<p>Each plugin needs `manifest.json` + `index.js` (optional `styles.css`):</p>
<p>The server exposes:</p>
<li>`GET /api/dashboard/plugins` — manifest list</li>
<li>`GET /dashboard-plugins/{name}/{path}` — static assets</li>
<p>Plugins register views in `index.js`:</p>
<p>Sample: [`sample-board`](../../src/praisonaiui/templates/frontend/dashboard-plugins/sample-board/).</p>
<h2>Agent plugins vs dashboard plugins</h2>
<p>| System | Location | Purpose |</p>
<p>|--------|----------|---------|</p>
<p>| Agent plugins | `~/.praisonai/plugins/` | Python agent extensions |</p>
<p>| Dashboard plugins | `~/.praisonai/dashboard-plugins/` | JS UI tabs |</p>
<p>See [PraisonAI package integration](praisonai-package-integration.md) for backend wiring, jobs API, and deployment.</p>
<h2>Granular control — opt-in / opt-out</h2>
<p>| What you control | How | Example |</p>
<p>|------------------|-----|---------|</p>
<p>| UI mode | `aiui.set_style(...)` | `"dashboard"`, `"chat"`, `"docs"` |</p>
<p>| Sidebar pages | `aiui.set_pages([ids])` whitelist | `["chat", "sessions"]` |</p>
<p>| Hide built-ins | YAML `pages.disabled: [...]` | Blacklist in server |</p>
<p>| Sidebar on/off | `set_dashboard(sidebar=False)` | Chat-only full width |</p>
<p>| Page title bar | `set_dashboard(page_header=False)` | Cleaner surface |</p>
<p>| Optional modules | `set_dashboard(modules=[...])` | `["jobs"]` only |</p>
<p>| Third-party tabs | Install chosen `dashboard-plugins/` folders | Manifest per plugin |</p>
<p>| Shell chrome | `registerSlot` | Header/footer widgets |</p>
<p>| Look only | `set_theme`, `set_branding`, `set_custom_css` | White-label |</p>
<p>| Replace one page | `registerView(pageId, ...)` | Override built-in |</p>
<p>| Board UI | `aiui.board()` or plugin | Not in default nav |</p>
<p>**Note:** `@aiui.page()` custom pages are **not** filtered by `set_pages()` — only built-in dashboard pages are. Remove custom pages from code to hide them.</p>
<h3>Example profiles</h3>
<p>CLI: `aiui pages ids` lists built-in page ids for whitelists.</p>
<h2>DRY rules for contributors</h2>
<p>1. Add new layout types in **`ui.py`** and one `case` in **`dashboard.js`**.</p>
<p>2. Page-specific UI belongs in **`plugins/views/*.js`**, delegating to shared modules (`jobs.js`, etc.) via thin wrappers.</p>
<p>3. Reuse **`_helpers.js`** (`pageToolbar`, `filterChips`, `searchInput`, `modalShell`, `toast`).</p>
<p>4. Boards compose **`card`** / **`columns`** — do not duplicate card markup in plugins.</p>
