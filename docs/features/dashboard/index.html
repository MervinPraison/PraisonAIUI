  <div id="root"><noscript><h1>Dashboard</h1>
<p>Build rich admin panels with **zero HTML/CSS/JS**. Register pages from Python, compose UIs with the component API, and the SDK renders everything.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>1. **`@aiui.page()`** registers a page with the server</p>
<p>2. **`dashboard.js`** fetches `/api/pages`, builds the sidebar automatically</p>
<p>3. When a page is selected, it fetches `/api/pages/{id}/data`</p>
<p>4. If the data contains `_components`, they render as real UI elements (cards, tables, etc.)</p>
<h2>Registering Pages</h2>
<h3>Basic Page</h3>
<p>Pages without component layouts render as formatted JSON.</p>
<h3>Page with Components</h3>
<h3>Page Groups</h3>
<p>Pages are grouped in the sidebar by the `group` parameter:</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `page_id` | `str` | ✅ | Unique identifier (URL-safe) |</p>
<p>| `title` | `str` | ✅ | Display name in sidebar |</p>
<p>| `icon` | `str` | ❌ | Emoji or icon character |</p>
<p>| `group` | `str` | ❌ | Sidebar group name |</p>
<p>| `description` | `str` | ❌ | Subtitle below the title |</p>

<h2>Built-in Pages</h2>
<p>When style is set to `dashboard`, **16 built-in pages** are auto-registered from the feature system:</p>
<p>| Page | Group | Description |</p>
<p>|------|-------|-------------|</p>
<p>| 🤖 Agents | Agent | Configured AI agents |</p>
<p>| ⚡ Skills | Agent | Agent tools and skills |</p>
<p>| 🖥️ Nodes | Agent | Execution nodes |</p>
<p>| 📊 Overview | Control | System overview |</p>
<p>| 📡 Channels | Control | Messaging channels |</p>
<p>| 📋 Sessions | Control | Active sessions |</p>
<p>| 📻 Instances | Control | Connected instances |</p>
<p>| 📈 Usage | Control | Token usage analytics |</p>
<p>| ⏰ Cron | Control | Scheduled jobs |</p>
<p>| 📋 Jobs | Control | Async job queue |</p>
<p>| ✅ Approvals | Control | Pending approvals |</p>
<p>| 🔌 API | Control | API documentation |</p>
<p>| ⚙️ Config | Settings | Runtime configuration |</p>
<p>| 🔐 Auth | Settings | Authentication |</p>
<p>| 📜 Logs | Settings | Real-time log viewer |</p>
<p>| 🐛 Debug | Settings | Debug information |</p>
<p>Custom pages added via `@aiui.page()` appear alongside built-in pages.</p>
<h2>Test Panel</h2>
<p>Every dashboard includes a **Test All Features** link at the bottom of the sidebar. It auto-discovers all registered features from `/api/features` and tests each endpoint, showing pass/fail results in a grid.</p>
<h2>Full Example</h2>
<h2>API Endpoints</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/pages` | GET | List all registered pages |</p>
<p>| `/api/pages/{id}/data` | GET | Get page handler response |</p>
<p>| `/api/features` | GET | List all registered features |</p>
<p>| `/plugins/plugins.json` | GET | Style-aware frontend plugin list |</p></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) return;
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Two-stage: immediate for fast plugins, delayed for CDN loads (mermaid)
          setTimeout(notify, 300);
          setTimeout(notify, 3000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { });
    })();
  </script>
