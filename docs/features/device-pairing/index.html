  <div id="root"><noscript><h1>Device Pairing</h1>
<p>Pair devices to sessions using **short hex codes** — scan and sync across mobile, tablet, and desktop.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>1. **Desktop** requests a pairing code for its session</p>
<p>2. Code is displayed on screen (6-char hex, 5-minute TTL)</p>
<p>3. **Mobile** enters the code to validate and pair</p>
<p>4. Server links the mobile device to the desktop's session</p>
<p>5. Both devices can now access the same conversation</p>
<h3>Security</h3>
<li>Codes are **single-use** — reusing returns `{"valid": false, "error": "Code already used"}`</li>
<li>Codes **expire** after 5 minutes (configurable TTL)</li>
<li>Max 5 devices per session (configurable)</li>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/pairing/create` | POST | Generate a pairing code |</p>
<p>| `/api/pairing/validate` | POST | Validate and consume a code |</p>
<p>| `/api/pairing/devices` | GET | List paired devices for session |</p>
<p>| `/api/pairing/devices/{id}` | DELETE | Remove a paired device |</p>
<h3>POST /api/pairing/create</h3>
<h3>POST /api/pairing/validate</h3>
