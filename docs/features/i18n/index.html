<body>
  <div id="root"><noscript><h1>Internationalization (i18n)</h1>
<p>Multi-language support with **locale switching**, string lookup, and variable interpolation. Ships with English, Spanish, and French.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>The i18n system uses a **key-based** translation approach:</p>
<p>1. Each string has a dotted key (e.g., `app.welcome`, `chat.send`)</p>
<p>2. Keys are organized by namespace: `app`, `chat`, `nav`, `error`</p>
<p>3. Variable interpolation: `{name}` placeholders are replaced at lookup time</p>
<p>4. Unknown keys return the key itself as fallback</p>
<h2>Built-in Locales</h2>
<p>| Locale | Language | Strings |</p>
<p>|--------|----------|---------|</p>
<p>| `en` | English | 11 |</p>
<p>| `es` | Spanish (Español) | 11 |</p>
<p>| `fr` | French (Français) | 11 |</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/i18n/locales` | GET | List available locales |</p>
<p>| `/api/i18n/strings/{locale}` | GET | Get all strings for a locale |</p>
<p>| `/api/i18n/translate` | POST | Translate a key with optional variables |</p>
<p>| `/api/i18n/locale` | GET | Get current default locale |</p>
<p>| `/api/i18n/locale` | POST | Set default locale |</p>
<h3>GET /api/i18n/strings/es</h3>
<h3>POST /api/i18n/translate</h3></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        var v = Date.now(); // Cache-busting version parameter
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js?v=' + v).then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
