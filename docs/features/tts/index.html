  <div id="root"><noscript><h1>Text-to-Speech (TTS)</h1>
<p>Synthesize speech from text using **swappable backends** — browser-native (zero cost) or OpenAI TTS API.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>**Default**: `BrowserTTSManager` — uses the browser's built-in Web Speech API, requires no API key, runs entirely client-side.</p>
<p>**Optional**: `OpenAITTSManager` — uses OpenAI's TTS API for higher-quality voices (alloy, echo, fable, onyx, nova, shimmer). Requires `openai` package and API key.</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/tts/voices` | GET | List available voices |</p>
<p>| `/api/tts/synthesize` | POST | Synthesize speech from text |</p>
<h3>GET /api/tts/voices</h3>
<h3>POST /api/tts/synthesize</h3>
