  <div id="root"><noscript><h1>Steps / Chain-of-Thought</h1>
<p>Visualize agent reasoning and tool calls as collapsible, nested steps in the chat interface.</p>

<h2>Frontend Visualization</h2>
<p>Steps appear in the chat as collapsible panels showing:</p>
<li>**Icons** indicating step type (🔧 🧠 🤖 📚 ⚡)</li>
<li>**Expandable content** with input/output details</li>
<li>**Nested hierarchy** for complex reasoning chains</li>
<li>**Real-time updates** as steps stream content</li>
<h2>API Reference</h2>
<h3>`aiui.Step(name, type="reasoning", parent=None, metadata={})`</h3>
<p>**Parameters:**</p>
<li>`name` (str): Display name for the step</li>
<li>`type` (StepType, optional): Step type - one of `"tool_call"`, `"reasoning"`, `"sub_agent"`, `"retrieval"`, `"custom"` (default: `"reasoning"`)</li>
<li>`parent` (Step, optional): Parent step for nesting</li>
<li>`metadata` (dict, optional): Additional step metadata</li>
<p>**Methods:**</p>
<li>`async stream_token(token)`: Stream content to the step</li>
<li>Context manager protocol: `async with step: ...`</li>
<h3>`@aiui.step(name, type="reasoning", **metadata)`</h3>
<p>**Decorator Parameters:**</p>
<li>`name` (str): Display name for the step</li>
<li>`type` (StepType, optional): Step type (default: `"reasoning"`)</li>
<li>`**metadata`: Additional metadata to include with the step</li>
<p>**Usage:**</p>
<h3>Events Emitted</h3>
<p>Steps emit these `RunEventType` events:</p>
<li>`REASONING_STARTED`: Step begins (includes `step_type`, `parent_id`, `metadata`)</li>
<li>`REASONING_STEP`: Content streamed (includes `step_type`)</li>
<li>`REASONING_COMPLETED`: Step finishes (includes `step_type`, `duration`, `error`, `metadata`)</li></noscript></div>
