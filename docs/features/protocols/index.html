  <div id="root"><noscript><h1>Feature Protocols</h1>
<p>PraisonAIUI uses a **protocol-driven architecture** to wire features into the server. Every feature module implements the `BaseFeatureProtocol` ABC, which auto-registers API routes, CLI commands, and health checks.</p>

<p>Every feature module must implement:</p>
<p>| Method | Return | Required | Description |</p>
<p>|--------|--------|----------|-------------|</p>
<p>| `name` | `str` | âś“ | Unique feature identifier |</p>

<p>| `routes()` | `List[Route]` | âś“ | Starlette routes to mount |</p>

<h2>Built-in Features Reference</h2>
<h3>1. Approvals</h3>
<p>Tool-execution approval management with policies, history, and SSE streaming.</p>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/approvals` | GET | List all approvals |</p>
<p>| `/api/approvals` | POST | Create approval request |</p>
<p>| `/api/approvals/pending` | GET | List pending approvals |</p>
<p>| `/api/approvals/history` | GET | List resolved approvals |</p>
<p>| `/api/approvals/policies` | GET | Get auto-approve/deny policies |</p>
<p>| `/api/approvals/policies` | PUT | Update policies |</p>
<p>| `/api/approvals/stream` | GET | SSE stream for real-time updates |</p>
<p>| `/api/approvals/{id}` | GET | Get single approval |</p>
<p>| `/api/approvals/{id}/approve` | POST | Approve request |</p>
<p>| `/api/approvals/{id}/deny` | POST | Deny request |</p>
<p>**CLI:** `aiui approval list`, `aiui approval pending`</p>
<h3>2. Channels</h3>
<p>Multi-platform messaging channel management (Discord, Slack, Telegram, WhatsApp, etc.).</p>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/channels` | GET | List all channels (enriched with gateway status) |</p>
<p>| `/api/channels` | POST | Add a channel |</p>
<p>| `/api/channels/platforms` | GET | List supported platforms |</p>
<p>| `/api/channels/{id}` | GET | Get channel details |</p>
<p>| `/api/channels/{id}` | PUT | Update channel |</p>
<p>| `/api/channels/{id}` | DELETE | Remove channel |</p>
<p>| `/api/channels/{id}/toggle` | POST | Enable/disable |</p>
<p>| `/api/channels/{id}/status` | GET | Live status (gateway-enriched) |</p>
<p>| `/api/channels/{id}/restart` | POST | Restart channel bot (via gateway) |</p>
<p>**CLI:** `aiui channel list`, `aiui channel status`, `aiui channel platforms`</p>
<h3>3. Schedules</h3>

<p>|----------|--------|-------------|</p>

<h2>Route Ordering</h2>
<p>> **Important:** When defining routes with parametric paths (e.g., `/{id}`), always place literal paths (e.g., `/log`, `/runs`) **before** the parametric route. Starlette matches routes in order, and a parametric route will capture literal segments as parameter values.</p>
