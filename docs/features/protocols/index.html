<p>PraisonAIUI uses a **protocol-driven architecture** to wire features into the server. Every feature module implements the `BaseFeatureProtocol` ABC, which auto-registers API routes, CLI commands, and health checks.</p>

<h2>BaseFeatureProtocol API</h2>
<p>Every feature module must implement:</p>
<p>| Method | Return | Required | Description |</p>
<p>|--------|--------|----------|-------------|</p>
<p>| `name` | `str` | ✓ | Unique feature identifier |</p>
<p>| `description` | `str` | ✓ | Human-readable description |</p>
<p>| `routes()` | `List[Route]` | ✓ | Starlette routes to mount |</p>
<p>| `cli_commands()` | `List[dict]` | ○ | CLI command metadata |</p>
<p>| `health()` | `dict` | ○ | Health check (default: `{"status": "ok"}`) |</p>
<p>| `info()` | `dict` | ○ | Metadata for `/api/features` listing |</p>

<h2>Built-in Features Reference</h2>
<h3>1. Approvals</h3>
<p>Manage tool-execution approval requests.</p>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/approvals` | GET | List approvals (filter: `?status=pending\|resolved\|all`) |</p>
<p>| `/api/approvals` | POST | Create approval request |</p>
<p>| `/api/approvals/{id}` | GET | Get single approval |</p>
<p>| `/api/approvals/{id}/resolve` | POST | Approve/deny |</p>
<p>| `/api/approvals/config` | GET | Get approval config |</p>
<p>**CLI:** `aiui approval list`, `aiui approval pending`, `aiui approval resolve <id>`</p>
<h3>2. Channels</h3>

<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/channels` | GET | List all channels (enriched with gateway status) |</p>

<p>| `/api/channels/{id}` | GET | Get channel details |</p>
<p>| `/api/channels/{id}` | PUT | Update channel |</p>
<p>| `/api/channels/{id}` | DELETE | Remove channel |</p>

<h2>Route Ordering</h2>
<p>> **Important:** When defining routes with parametric paths (e.g., `/{id}`), always place literal paths (e.g., `/log`, `/runs`) **before** the parametric route. Starlette matches routes in order, and a parametric route will capture literal segments as parameter values.</p>
<h2>Integration Example</h2></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) return;
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Two-stage: immediate for fast plugins, delayed for CDN loads (mermaid)
          setTimeout(notify, 300);
          setTimeout(notify, 3000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { });
    })();
  </script>
