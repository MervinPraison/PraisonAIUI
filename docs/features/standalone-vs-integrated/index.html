  <div id="root"><noscript><h1>Standalone vs Integrated</h1>
<p>This page summarises the expected install and runtime shape for PraisonAIUI in both modes.</p>
<h2>Install Matrix</h2>
<p>| Mode | Package install | Runtime dependency | Behaviour |</p>
<p>| --- | --- | --- | --- |</p>
<p>| Standalone UI | `pip install praisonaiui` | Optional SDK packages absent | Uses built-in local managers and fallbacks |</p>
<p>| Integrated (PraisonAI) | `pip install praisonaiui praisonai praisonaiagents` | SDK and wrapper available | Uses injected backends and SDK-aware managers |</p>
<h2>Practical Differences</h2>
<li>**Session/data handling**: standalone uses UI datastore fallback; integrated aligns with SDK-backed stores.</li>
<li>**Feature backends**: standalone keeps in-memory/mock behaviour; integrated can route through injected factories.</li>
<li>**Lifecycle hooks**: integrated mode can subscribe to SDK hooks (handoff, MCP lifecycle, tracing/eval stores).</li>
<h2>Recommendation</h2>
<p>Use standalone mode for local UI-only workflows. Use integrated mode when you need shared runtime state with PraisonAI agents, tools, tracing, approvals, and schedules.</p></noscript></div>
