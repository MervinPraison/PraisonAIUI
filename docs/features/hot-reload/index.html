<body>
  <div id="root"><noscript><h1>Hot Reload</h1>
<p>Instant rebuilds during development.</p>
<h2>Dev Mode</h2>
<p>Start development mode with file watching:</p>
<h2>What Gets Watched</h2>
<p>The dev server watches:</p>
<li>`aiui.template.yaml` - Configuration changes</li>
<li>`docs/` - Content changes</li>
<li>Any configured content directories</li>
<h2>Rebuild Triggers</h2>
<p>| Change Type | Action |</p>
<p>|-------------|--------|</p>
<p>| Config change | Full rebuild |</p>
<p>| Doc added/removed | Nav rebuild |</p>
<p>| Doc content change | Single page rebuild |</p>
<h2>WebSocket Updates</h2>
<p>The dev server uses WebSocket for instant updates:</p>
<h2>Options</h2>
<h2>Integration with Next.js</h2>
<p>When using Next.js development:</p>
<p>Or use concurrently:</p></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
