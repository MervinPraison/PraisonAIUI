  <div id="root"><noscript><h1>Chat Attachments</h1>
<p>Upload files to include with chat messages — PDFs, CSVs, images, and text files up to 50 MB per file. Uploaded files are **automatically processed** and their content is injected into the agent's prompt.</p>
<p>![Attachments Panel](../images/attachments-panel.png)</p>
<h2>Quick Start</h2>
<p>The agent will receive the extracted PDF text prepended to the user message and can answer questions about the document's content.</p>
<h2>How It Works</h2>
<h2>File Processing by Type</h2>
<p>When you send a chat message with `attachment_ids`, each attachment is processed based on its type:</p>
<p>| File Type | Processing | What the Agent Sees |</p>
<p>|-----------|-----------|-------------------|</p>
<p>| **PDF** (`.pdf`) | Text extracted via `pypdf` | Full text content prepended to prompt |</p>
<p>| **Images** (`.png`, `.jpg`, etc.) | Passed to SDK multimodal handler | Image sent as base64 to vision-capable LLMs |</p>
<p>| **Text/Code** (`.txt`, `.py`, `.csv`, etc.) | File contents read directly | Full file content prepended to prompt |</p>
<p>!!! note "PDF Dependency"</p>
<p>PDF text extraction requires the `pypdf` package (`pip install pypdf`). If `pypdf` is not installed, a fallback message is shown instead of the extracted text. `pypdf` is included in PraisonAIUI's dependencies by default.</p>
<h2>Supported File Types</h2>
<p>| Category | Extensions |</p>
<p>|----------|-----------|</p>
<p>| Documents | `.pdf`, `.doc`, `.docx`, `.txt`, `.md` |</p>
<p>| Data | `.csv`, `.json`, `.xml`, `.yaml`, `.yml` |</p>
<p>| Images | `.png`, `.jpg`, `.jpeg`, `.gif`, `.webp`, `.svg` |</p>
<p>| Code | `.py`, `.js`, `.ts`, `.html`, `.css` |</p>
<p>!!! warning "Blocked Types"</p>
<p>Executable files (`.exe`, `.sh`, `.bat`, `.cmd`, `.com`) are rejected by default.</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/chat/attachments` | POST | Upload a file |</p>
<p>| `/api/chat/attachments` | GET | List attachments for a session |</p>
<p>| `/api/chat/attachments/{id}` | DELETE | Delete an attachment |</p>
