  <div id="root"><noscript><h1>AIUI Integration — Critical Review & Architecture Analysis</h1>
<p>> **Principle**: AIUI's `config.yaml` is a **schemaless** YAML dict (`YAMLConfigStore`). The adapter must produce what AIUI already reads — AIUI's config structure is NOT modified. Additional keys are silently ignored.</p>

<p>| # | Criterion | Status |</p>
<p>|---|-----------|--------|</p>
<p>| AC-1 | 3rd runtime = adapter file + enum + registry | ✅ Done |</p>
<p>| AC-2 | Zero `name ===` outside adapters | ⚠️ 4 deferred (OpenClaw-specific) |</p>
<p>| AC-3 | Config format via adapter (`parseConfig`/`serializeConfig`) | ✅ Done |</p>
<p>| AC-4 | AIUI dashboard tabs wired | ✅ Done |</p>
<p>| AC-5 | `openclaw/route.ts` guards non-OpenClaw | ✅ Done (400 RUNTIME_MISMATCH) |</p>
<p>| AC-6 | Prisma migration exists | ✅ Done |</p>
<p>| AC-7 | All OpenClaw tests pass | ✅ 1200/1240 (40 pre-existing) |</p>
<p>| AC-8 | `channel-sync.ts` uses adapter methods | ✅ parse/serialize/containerUser wired |</p>
<p>---</p>

<h3>Key Regression Fix</h3>
<p>> [!IMPORTANT]</p>
<p>> `syncChannelConfig()` was NOT wired directly because consumer code passes **pre-decrypted** tokens (via `decryptSafe()`), while the adapter would receive raw encrypted DB values. The original `config.channels = channelsConfig` pattern was preserved — only format methods (`parseConfig`/`serializeConfig`/`containerUser`) are adapter-driven.</p>
<h3>4 Deferred Leaks (OpenClaw-Specific)</h3>
<p>| Leak | Why Deferred |</p>
<p>|------|-------------|</p>
<p>| `provision-queue` chown L289 | OpenClaw post-health — skipped for non-OpenClaw |</p>
<p>| `provision-queue` device pairing L358 | OpenClaw-specific feature |</p>
<p>| `health/route` model path L184 | Different config structures per runtime |</p>
<p>| `health/route` env check L202 | Different env vars per runtime |</p>
<p>These are not protocol operations — they're OpenClaw-specific features that correctly skip for other runtimes.</p>

<h2>3. Protocol-Driven Assessment</h2>
<h3>What AIUI's Config.yaml Already Reads (Unchanged)</h3>
<p>**Not in config**: API key (`OPENAI_API_KEY` env var), auth tokens (in-memory feature).</p>
<h3>Adding a New Runtime (After Hostaibot Refactoring)</h3>
<p>1. Create `src/lib/runtime/newruntime-adapter.ts` — implement all 12 interface methods</p>
<p>2. Add `NEWRUNTIME` to `RuntimeType` enum in `schema.prisma`</p>
<p>3. Add 3 lines to `registry.ts`</p>
<p>4. Run `npx prisma migrate dev`</p>
<p>**Zero consumer file changes needed.**</p>

<h2>5. Gap Analysis — AIUI Side (Validated)</h2>
<p>> [!NOTE]</p>
<p>> All 5 proposed gaps were validated against the actual codebase. **Only 1 was real** — it has been fixed.</p>
<h3>G-U1: Config Hot-Reload Skips Channels — ✅ FIXED</h3>
<p>**Was real**: `_on_config_reload()` in [server.py L1239](file:///Users/praison/PraisonAIUI/src/praisonaiui/server.py#L1239) reloaded agents and skills but NOT channels. The `_channels` module-level dict was never refreshed.</p>
<p>**Fix applied**: Added channel reload block to `_on_config_reload()` — clears `_channels`, re-loads from config store, resets `_auto_started` flag so changed channels auto-start on next API request. Follows the same pattern as agents/skills.</p>
<p>render_diffs(file:///Users/praison/PraisonAIUI/src/praisonaiui/server.py)</p>
<h3>G-U2: No Graceful Shutdown — ❌ NOT A REAL GAP</h3>
<p>**Why**: AIUI runs via `uvicorn.run()` ([cli.py L507](file:///Users/praison/PraisonAIUI/src/praisonaiui/cli.py#L507)). Uvicorn already handles `SIGTERM` gracefully — it stops accepting new connections, waits for in-flight requests, then exits cleanly. No custom handler needed.</p>
<h3>G-U3: No Pre-Provisioned Auth Token — ❌ NOT A REAL GAP</h3>
<p>**Why**: `AUTH_ENFORCE` is **off by default** (env var opt-in, [server.py L1060](file:///Users/praison/PraisonAIUI/src/praisonaiui/server.py#L1060)). In managed containers, simply don't set `AUTH_ENFORCE=true`. No AIUI code change needed.</p>
<h3>G-U4: Health Endpoint Missing Metadata — ❌ NOT A REAL GAP</h3>
<p>**Why**: `/api/dashboard` ([server.py L375-390](file:///Users/praison/PraisonAIUI/src/praisonaiui/server.py#L375-L390)) already returns `uptime_seconds`, `version`, `stats`, `provider_health`, `agents`. The adapter can call this richer endpoint. `/health` is intentionally lightweight for probes.</p>
<h3>G-U5: Dockerfile Hardening — ❌ NOT A REAL GAP</h3>
<p>**Why**: The [Dockerfile](file:///Users/praison/PraisonAIUI/Dockerfile) **already has**:</p>
<li>`HEALTHCHECK` with `curl -f http://localhost:${AIUI_PORT}/health`</li>
<li>`AIUI_PORT=8082` env var</li>
<li>`curl` installed for health probes</li>
<li>Proper multi-stage build</li>

<p>All 7 adapter fixes (G-A1 through G-A7) were implemented as part of the hostaibot protocol-driven refactoring. Verified with 1200/1240 tests passing.</p>

<p>| G-U2: Graceful shutdown | ❌ Not real | Uvicorn handles SIGTERM natively |</p>
<p>| G-U3: Admin token | ❌ Not real | AUTH_ENFORCE is off by default |</p>
<p>| G-U4: Health metadata | ❌ Not real | `/api/dashboard` already has all metadata |</p>
