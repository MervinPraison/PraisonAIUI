  <div id="root"><noscript><h1>Media Analysis</h1>
<p>**Image understanding, OCR, and object detection** powered by VisionAgent — analyze uploaded images and documents.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>The media analysis feature uses the **VisionAgent** and **OCRAgent** from the PraisonAI SDK when available. Without the SDK, it returns simulated responses to allow frontend development without API keys.</p>
<h3>Capabilities</h3>
<p>| Capability | Description |</p>
<p>|------------|-------------|</p>
<p>| `image_description` | Natural language description of image contents |</p>
<p>| `ocr` | Extract text from images and documents |</p>
<p>| `object_detection` | Identify objects in images |</p>
<p>| `image_qa` | Answer questions about image contents |</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/media/analyze` | POST | Analyze an image |</p>
<p>| `/api/media/ocr` | POST | Extract text via OCR |</p>
<p>| `/api/media/capabilities` | GET | List analysis capabilities |</p>
<h3>POST /api/media/analyze</h3>
<h3>POST /api/media/ocr</h3>
<h2>Related</h2>
<li>[Attachments](attachments.md) — Upload images to analyze via media analysis</li></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        var v = Date.now(); // Cache-busting version parameter
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js?v=' + v).then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
