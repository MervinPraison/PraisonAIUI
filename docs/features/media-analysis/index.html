  <div id="root"><noscript><h1>Media Analysis</h1>
<p>**Image understanding, OCR, and object detection** powered by VisionAgent — analyze uploaded images and documents.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>The media analysis feature uses the **VisionAgent** and **OCRAgent** from the PraisonAI SDK when available. Without the SDK, it returns simulated responses to allow frontend development without API keys.</p>
<h3>Capabilities</h3>
<p>| Capability | Description |</p>
<p>|------------|-------------|</p>
<p>| `image_description` | Natural language description of image contents |</p>
<p>| `ocr` | Extract text from images and documents |</p>
<p>| `object_detection` | Identify objects in images |</p>
<p>| `image_qa` | Answer questions about image contents |</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/media/analyze` | POST | Analyze an image |</p>
<p>| `/api/media/ocr` | POST | Extract text via OCR |</p>
<p>| `/api/media/capabilities` | GET | List analysis capabilities |</p>
<h3>POST /api/media/analyze</h3>
<h3>POST /api/media/ocr</h3>
