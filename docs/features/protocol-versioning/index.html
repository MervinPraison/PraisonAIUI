  <div id="root"><noscript><h1>Protocol Versioning</h1>
<p>**WebSocket protocol negotiation** between client and server — ensures compatibility and graceful degradation.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<h2>Version Compatibility</h2>
<p>The protocol uses **semantic versioning** — clients and servers are compatible if they share the **same major version**:</p>
<p>| Client Version | Server Version | Compatible? |</p>
<p>|---------------|----------------|-------------|</p>
<p>| 1.0.0 | 1.0.0 | ✅ Yes |</p>
<p>| 1.2.0 | 1.0.0 | ✅ Yes (same major) |</p>
<p>| 2.0.0 | 1.0.0 | ❌ No (different major) |</p>
<h2>Event Types</h2>
<p>The protocol defines these standard event types:</p>
<p>| Event Type | Direction | Description |</p>
<p>|-----------|-----------|-------------|</p>
<p>| `chat` | Client → Server | User sends a message |</p>
<p>| `chat_abort` | Client → Server | Abort an active run |</p>
<p>| `ping` / `pong` | Both | Keepalive |</p>
<p>| `run_content` | Server → Client | Delta token (streaming) |</p>
<p>| `run_completed` | Server → Client | Run finished |</p>
<p>| `run_error` | Server → Client | Run failed |</p>
<p>| `tool_call_started` | Server → Client | Tool execution began |</p>
<p>| `tool_call_completed` | Server → Client | Tool returned result |</p>
<p>| `reasoning` | Server → Client | Agent reasoning/thinking |</p>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/protocol` | GET | Get protocol version and supported event types |</p>
<p>| `/api/protocol/negotiate` | POST | Check client compatibility |</p>
<h3>Protocol Info</h3>
<h3>Negotiate</h3>

  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
