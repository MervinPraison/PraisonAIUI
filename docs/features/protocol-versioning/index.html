  <div id="root"><noscript><h1>Protocol Versioning</h1>
<p>**WebSocket protocol negotiation** between client and server — ensures compatibility and graceful degradation.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<h2>Version Compatibility</h2>
<p>The protocol uses **semantic versioning** — clients and servers are compatible if they share the **same major version**:</p>
<p>| Client Version | Server Version | Compatible? |</p>
<p>|---------------|----------------|-------------|</p>
<p>| 1.0.0 | 1.0.0 | ✅ Yes |</p>
<p>| 1.2.0 | 1.0.0 | ✅ Yes (same major) |</p>
<p>| 2.0.0 | 1.0.0 | ❌ No (different major) |</p>
<h2>Event Types</h2>
<p>The protocol defines these standard event types:</p>
<p>| Event Type | Direction | Description |</p>
<p>|-----------|-----------|-------------|</p>
<p>| `chat` | Client → Server | User sends a message |</p>
<p>| `chat_abort` | Client → Server | Abort an active run |</p>
<p>| `ping` / `pong` | Both | Keepalive |</p>
<p>| `run_content` | Server → Client | Delta token (streaming) |</p>
<p>| `run_completed` | Server → Client | Run finished |</p>
<p>| `run_error` | Server → Client | Run failed |</p>
<p>| `tool_call_started` | Server → Client | Tool execution began |</p>
<p>| `tool_call_completed` | Server → Client | Tool returned result |</p>
<p>| `reasoning` | Server → Client | Agent reasoning/thinking |</p>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/protocol` | GET | Get protocol version and supported event types |</p>
<p>| `/api/protocol/negotiate` | POST | Check client compatibility |</p>
