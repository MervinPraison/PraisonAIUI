  <div id="root"><noscript><h1>How the UI Looks Are Built</h1>
<p>A beginner-friendly guide to how PraisonAIUI creates its visual appearance — what controls the colors, fonts, and layout you see on screen.</p>
<h2>The Big Picture</h2>
<p>PraisonAIUI's appearance comes from **three layers** working together:</p>
<p>**In plain English:**</p>
<p>1. You choose a theme preset (like "zinc" or "blue") in your config</p>
<p>2. The system translates that into CSS variables (color codes)</p>
<p>3. Every button, text, and background reads those variables to know what color to be</p>

<h2>What You Can Control</h2>
<h3>Theme Presets</h3>
<p>The preset sets your **color palette** — it changes the accent color used for buttons, active states, and highlights across the entire UI.</p>
<p>| Category | Options |</p>
<p>|----------|---------|</p>
<p>| **Neutral** | zinc (default), slate, stone, gray, neutral |</p>
<p>| **Warm** | red, orange, amber, yellow |</p>
<p>| **Cool** | blue, indigo, violet, purple, cyan, sky, teal |</p>
<p>| **Nature** | green, emerald, lime |</p>
<p>| **Vibrant** | pink, rose, fuchsia |</p>
<h3>Dark Mode</h3>
<p>When light mode is on, all backgrounds flip to white/light gray and text becomes dark.</p>
<h3>Border Radius</h3>
<p>| Value | Effect |</p>
<p>|-------|--------|</p>
<p>| `none` | Sharp, square corners |</p>
<p>| `sm` | Slightly rounded |</p>
<p>| `md` | Medium rounded (default) |</p>
<p>| `lg` | More rounded |</p>
<p>| `xl` | Very rounded, pill-shaped buttons |</p>
<h3>Dashboard CSS Variables</h3>
<p>For fine-grained control, override these variables in `customCss`:</p>
<p>| Variable | Default (dark) | What It Controls |</p>
<p>|----------|---------------|-----------------|</p>
<p>| `--db-bg` | `#0a0a0f` | Page background |</p>
<p>| `--db-sidebar-bg` | `#111118` | Sidebar background |</p>
<p>| `--db-accent` | `#6366f1` | Buttons, active items, highlights |</p>
<p>| `--db-text` | `#e4e4e7` | Primary text |</p>
<p>| `--db-text-dim` | `#71717a` | Secondary/muted text |</p>
<p>| `--db-border` | `rgba(255,255,255,0.06)` | Borders and dividers |</p>
<p>| `--db-card-bg` | `rgba(255,255,255,0.03)` | Card backgrounds |</p>
<p>| `--db-radius` | `10px` | Corner roundness |</p>
<p>---</p>
<h2>Priority Order</h2>
<p>When the same setting is defined in multiple places:</p>
<p>| Priority | Source | Example |</p>
<p>|----------|--------|---------|</p>
<p>| 1 (highest) | **CLI flag** | `--style chat` |</p>
<p>| 2 | **Python API** | `aiui.set_theme(preset="blue")` |</p>
<p>| 3 | **YAML config** | `site.theme.preset: blue` |</p>
<p>| 4 (lowest) | **Built-in defaults** | zinc, dark, md radius |</p>
<p>---</p>
<h2>Two Chat Systems Explained</h2>
<p>PraisonAIUI includes **two different chat interfaces**. Understanding the difference helps you choose the right one and know what features to expect.</p>
<h3>React Chat — The Full-Featured Chat</h3>
<p>**When it's active:** `style: chat`, `style: agents`, or `style: playground`</p>
<p>This is the **recommended chat** for most users. It's built with React and benefits from the full modern web stack.</p>
<p>**What you get:**</p>
<p>| Feature | How it works |</p>
<p>|---------|-------------|</p>
<p>| 🎨 **Your theme colors** | Automatically follows your `preset` and `darkMode` settings |</p>
<p>| 📋 **Copy code button** | Click to copy any code block — shows "✓ Copied" feedback |</p>
<p>| 🌈 **Syntax highlighting** | Code is color-coded by language (Python, JavaScript, etc.) |</p>
<p>| 📊 **Markdown tables** | Tables render as proper formatted tables |</p>
<p>| 🔤 **Rich typography** | Headers, bold, italic, lists — all beautifully styled |</p>
<p>| 📎 **File attachments** | Upload files to include as context |</p>
<h3>Dashboard Chat — The Admin Chat</h3>
<p>**When it's active:** `style: dashboard`</p>
<p>This is a lighter chat built as a dashboard plugin. It's designed for quick admin interactions within the dashboard.</p>
<p>**What you get:**</p>
<p>| Feature | How it works |</p>
<p>|---------|-------------|</p>
<p>| 🎨 **Dashboard theme** | Uses the dashboard's color scheme (now follows your preset!) |</p>
<p>| 💬 **Basic markdown** | Bold, italic, headings, code blocks, links, lists |</p>
<p>| 🔧 **Tool call display** | Shows when the AI is using tools |</p>
<p>| 📋 **Session management** | Create, switch, and manage conversations |</p>
<p>| 🤖 **Agent selection** | Pick which AI agent to chat with |</p>
<p>**What it doesn't have (yet):**</p>
<li>❌ Copy button on code blocks</li>
<li>❌ Syntax highlighting (code blocks are plain text)</li>
<li>❌ Markdown tables</li>
<h3>Which Should I Use?</h3>
<p>| If you want... | Use this style |</p>
<p>|----------------|---------------|</p>
<p>| Best chat experience with all features | `style: chat` |</p>
<p>| Multi-agent dashboard with admin controls | `style: dashboard` |</p>
<p>| Agent profiles and switching | `style: agents` |</p>
<p>| Side-by-side prompt testing | `style: playground` |</p>

<h2>File Map</h2>

<p>| File | What It Does |</p>
<p>|------|-------------|</p>

<p>| `templates/frontend/plugins/dashboard.js` | Dashboard — defines `--db-*` color variables + reads config |</p>
