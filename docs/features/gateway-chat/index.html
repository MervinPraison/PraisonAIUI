<p>Real-time AI agent chat with **WebSocket streaming**, markdown rendering, tool call display, and session management.</p>

<h2>Features</h2>
<h3>Markdown Rendering</h3>
<p>Assistant messages are rendered with full markdown support:</p>
<li>**Bold**, *italic*, ~~strikethrough~~</li>
<li>Inline `code` and fenced code blocks with syntax highlighting</li>
<li>Ordered and unordered lists</li>
<li>Links (auto-detected and rendered safely)</li>
<h3>Tool Call Display</h3>
<p>![Tool Call Streaming](../images/tool-streaming.png)</p>
<p>When agents use tools, each call is displayed as a collapsible card:</p>
<li>Tool name and status indicator (running/completed/failed)</li>
<li>Input arguments (JSON)</li>
<li>Output results (rendered in code blocks)</li>
<h3>Session Management</h3>
<li>**New Session**: Click "New Chat" to create a fresh session</li>
<li>**Session History**: Switch between sessions in the sidebar</li>
<li>**Message History**: Full conversation history per session via REST API</li>
<h3>Message Abort</h3>
<li>Click the **Stop** button (or send `chat_abort` via WebSocket) to cancel an in-progress agent run</li>
<li>The partial response is preserved in history</li>
<h3>File Attachments</h3>
<p>Upload files to include with your chat messages — see [Attachments](attachments.md) for details.</p>

<h2>Frontend (chat.js)</h2>
<p>The chat frontend is a vanilla JavaScript plugin that auto-loads as a dashboard page:</p>
<p>| Feature | Implementation |</p>
<p>|---------|---------------|</p>
<p>| WebSocket streaming | `connectWebSocket()` with auto-reconnect |</p>

  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
