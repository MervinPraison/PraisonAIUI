<body style="background:#0f172a;margin:0">
  <div id="root"><noscript><h1>Plugin Marketplace</h1>
<p>Browse, search, install, and manage **plugins** from a registry. Supports local plugin discovery with a swappable backend for remote registries.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>The marketplace uses a **protocol-driven** architecture. The default `LocalMarketplaceManager` ships with a built-in catalog of common plugins. Custom implementations can connect to remote registries.</p>
<h2>Built-in Plugins</h2>
<p>| Plugin | Category | Description |</p>
<p>|--------|----------|-------------|</p>
<p>| `web_search` | tools | Search the web using DuckDuckGo |</p>
<p>| `code_executor` | tools | Execute Python code in sandbox |</p>
<p>| `file_manager` | tools | Read, write, and manage files |</p>
<p>| `memory_plugin` | memory | Persistent agent memory with ChromaDB |</p>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/marketplace/plugins` | GET | List all plugins |</p>
<p>| `/api/marketplace/search` | POST | Search plugins by query |</p>
<p>| `/api/marketplace/install` | POST | Install a plugin |</p>
<p>| `/api/marketplace/uninstall` | POST | Uninstall a plugin |</p>
<p>| `/api/marketplace/plugins/{id}` | GET | Get plugin details |</p>
<h3>POST /api/marketplace/install</h3>
<h3>POST /api/marketplace/search</h3>
<h2>Related</h2>
<li>[Skills](../api/features-api.md#skills) — Tool catalog that marketplace plugins extend</li></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        var v = Date.now(); // Cache-busting version parameter
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js?v=' + v).then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
