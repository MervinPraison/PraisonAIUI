  <div id="root"><noscript><h1>A2UI canvas — agent-driven UI</h1>
<p>PraisonAIUI hosts **A2UI v0.9** surfaces: agents push structured UI messages to a live canvas while users chat in the same window or on a full-page workspace.</p>
<p>For dashboard extension patterns (views, plugins, layout JSON), see [Agent UI host](agent-ui-host.md).</p>
<h2>Quick start</h2>
<p>Run the full example: [`examples/python/30-a2ui-canvas/app.py`](../../examples/python/30-a2ui-canvas/app.py).</p>
<h2>Dashboard pages</h2>
<p>| Page id | Route | Purpose |</p>
<p>|---------|-------|---------|</p>
<p>| `chat-canvas` | `/chat-canvas` | Split view — chat left, live A2UI preview right |</p>
<p>| `chat` | `/chat` | Vanilla chat (unchanged) |</p>
<p>| `canvas` | `/canvas` | Full-page surface workspace |</p>
<p>Enable the split preview with [`set_chat_preview`](../api/python.md#set_chat_previewenabled-surface_id-width). Settings appear in `/ui-config.json` as `chat.preview: { enabled, surfaceId, width }`.</p>
<h2>Agent integration</h2>
<p>Agents should call **`send_a2ui_messages`** (from `praisonaiagents.tools.a2ui_tools`) with A2UI message dicts:</p>
<p>Wrap the tool with **`coerce_a2ui_tool_messages`** so common LLM argument shapes still work:</p>
<p>`coerce_a2ui_tool_messages` accepts:</p>
<li>A JSON string or list of message dicts</li>
<li>A dict with a `messages` key</li>
<li>A bare `components` list (wrapped in `updateComponents`)</li>
<li>A single component dict (wrapped in `updateComponents`)</li>
<li>Missing `createSurface` (inserted automatically for the given `surface_id`)</li>
<p>Tool results are detected by [`a2ui_utils`](../../src/praisonaiui/a2ui_utils.py) and ingested into the surface store; connected clients receive WebSocket `a2ui_surface` events.</p>
<h2>HTTP API</h2>
<p>| Method | Path | Behaviour |</p>
<p>|--------|------|-----------|</p>
<p>| `GET` | `/api/surfaces` | List surfaces and message counts |</p>
<p>| `GET` | `/api/surfaces/{id}` | Surface state; **200 with `{ messages: [] }`** if not created yet (empty canvas is normal) |</p>
<p>| `POST` | `/api/surfaces/{id}/messages` | Append or replace messages (`replace: true` in body) |</p>
<p>| `POST` | `/api/surfaces/{id}/actions` | User action from a button/component |</p>
<p>| `DELETE` | `/api/surfaces/{id}` | Clear surface |</p>
<p>Realtime updates use the existing dashboard WebSocket (`a2ui_surface` payload).</p>
<h2>CLI</h2>
<p>Manage surfaces against a running server (`--server` / `AIUI_SERVER`, default `http://127.0.0.1:8000`):</p>
<p>`messages.json` must contain `{ "messages": [ ... ] }`.</p>
<h2>Frontend modules</h2>
<p>Shared dashboard JS (lazy-loaded with `chat-canvas`):</p>
<p>| Module | Role |</p>
<p>|--------|------|</p>
<p>| `surface-utils.js` | Load surface, WebSocket sync, post actions |</p>
<p>| `canvas-preview.js` | Right-hand preview panel |</p>
<p>| `a2ui-mapper.js` | Default DOM mapper (Text, Button, Column, Row, Card, …) |</p>
<p>| `plugins/views/chat-canvas.js` | Composes chat + preview without modifying `chat.js` |</p>
<p>Override rendering: `window.aiui.registerSurfaceRenderer("main", fn)`.</p>
<h2>Troubleshooting</h2>
<p>| Symptom | Likely cause | Fix |</p>
<p>|---------|--------------|-----|</p>
<p>| Chat works but canvas stays empty | Agent did not call `send_a2ui_messages` | Strengthen instructions; wrap tool with `coerce_a2ui_tool_messages` |</p>
<p>| Tool error / invalid JSON | LLM passed wrong shape | Use coercion wrapper; include schema prompt from `praisonaiagents.ui.a2ui.adapter` |</p>
<p>| Preview shows raw JSON | Component type not in `a2ui-mapper` | Extend mapper or use supported components |</p>
<p>| `GET /api/surfaces/main` empty | Normal before first push | Push via agent or `aiui surface push` |</p>
<p>| Button click does nothing | No `@aiui.surface_action` handler | Register handler for that `surface_id` |</p>
