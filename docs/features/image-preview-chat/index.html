  <div id="root"><noscript><h1>Image Preview in Chat</h1>
<p>Protocol-driven inline media for agent-generated images (and other element types) during chat streaming. Any backend that implements `BaseProvider` can emit images without PraisonAI-specific code in chat or the frontend.</p>
<h2>Problem This Solves</h2>
<p>Before this feature, PraisonAIUI could **render** images (`Message.add_image`, `ElementRenderer`) but the **wire protocol dropped media** during agent runs. ImageAgent / tool results appeared as JSON in the tool-call panel instead of inline `<img>` previews.</p>
<h2>Architecture</h2>
<p>Modular layers — same pattern as [A2UI surfaces](./agent-ui-host.md):</p>
<h3>Layer responsibilities</h3>
<p>| Layer | Module | Backend-agnostic? |</p>
<p>|-------|--------|-------------------|</p>
<p>| **Detection** | [`media_utils.py`](../../src/praisonaiui/media_utils.py) | Yes — normalises OpenAI, URL, b64, element dicts |</p>
<p>| **Protocol** | [`provider.py`](../../src/praisonaiui/provider.py) — `RunEventType.MESSAGE_ELEMENT` | Yes |</p>
<p>| **Adapter** | [`providers/__init__.py`](../../src/praisonaiui/providers/__init__.py) — PraisonAI bridge only | No — maps SDK/callback queue → protocol |</p>
<p>| **Transport** | [`chat.py`](../../src/praisonaiui/features/chat.py) — broadcast + persist | Yes |</p>
<p>| **Storage** | [`attachments.py`](../../src/praisonaiui/features/attachments.py) — `GET /api/chat/media/{id}` | Yes — reuses attachment store for b64 |</p>
<p>| **UI** | [`chat.js`](../../src/praisonaiui/templates/frontend/plugins/views/chat.js), [`ElementRenderer`](../../src/frontend/src/chat/MultimediaElements.tsx) | Yes — renders `{type, url, alt}` |</p>
<p>Detection and UI do **not** import PraisonAI. Only the provider adapter knows ImageAgent / OpenAI `{data: [{url}]}` shapes.</p>
<h2>Wire protocol</h2>
<h3>Event type</h3>
<p>Defined in Python as `RunEventType.MESSAGE_ELEMENT` and mirrored in [`types.ts`](../../src/frontend/src/types.ts).</p>
<h3>Helper (any provider)</h3>
<p>Element shape reuses the existing [message element schema](./message-elements.md) (`image`, `pdf`, `video`, `audio`, `file`, `code`).</p>
<h2>Data flow paths</h2>
<h3>1. Custom provider (swappable backend)</h3>
<p>Example app: [`examples/python/30-image-preview/app.py`](../../examples/python/30-image-preview/app.py).</p>
<h3>2. Callback handler (`@aiui.reply`)</h3>
<p>`PraisonAIProvider` maps queue events (`image`, `message` + `elements`) → `MESSAGE_ELEMENT`.</p>
<h3>3. Tool results (automatic detection)</h3>
<p>When a tool completes, `tool_completed_extra()` in [`a2ui_utils.py`](../../src/praisonaiui/a2ui_utils.py) calls `build_media_extra()` from `media_utils`. Supported shapes:</p>
<p>| Input shape | Example |</p>
<p>|-------------|---------|</p>
<p>| OpenAI / ImageAgent | `{"data": [{"url": "...", "b64_json": "...", "revised_prompt": "..."}]}` |</p>
<p>| Explicit element | `{"type": "image", "url": "..."}` |</p>
<p>| Plain URL string | `"https://cdn.example.com/out.png"` |</p>
<p>| Data URL | `"data:image/png;base64,..."` |</p>
<p>| Nested elements | `{"elements": [{"type": "video", "url": "..."}]}` |</p>
<p>`chat.py` broadcasts `message_element` for each detected element and attaches `elements` to the persisted assistant message.</p>
<h3>4. ImageAgent direct mode</h3>
<p>If the registered agent's `chat()` returns an OpenAI-shaped dict, `PraisonAIProvider._run_direct_mode` runs `extract_media_elements()` and emits `MESSAGE_ELEMENT` events before `RUN_COMPLETED`.</p>
<h2>Base64 storage</h2>
<p>Large `b64_json` payloads are **not** stored inline in message history. They are decoded and saved via `AttachmentManager`, then served at:</p>
<p>If storage fails, the system falls back to a `data:image/png;base64,...` URL.</p>
<h2>Frontend rendering</h2>
<p>| Surface | Handler |</p>
<p>|---------|---------|</p>
<p>| Dashboard chat (template) | `chat.js` — `case 'message_element': appendMediaElement()` |</p>
<p>| React chat | `streamingStore.ts` — `pendingElements` + `ElementRenderer` |</p>
<p>| Tool call panel | Thumbnail from `toolCall.elements` when expanded |</p>
<p>| Session reload | `elements` on messages from `/api/chat/history` and `/sessions/{id}/runs` |</p>
<p>See also [Message Elements](./message-elements.md) for element properties and display modes.</p>
<h2>Deduplication</h2>
<p>`_collect_element()` in `chat.py` dedupes by URL so the same image is not stored twice when both a `MESSAGE_ELEMENT` event and a tool completion carry the same URL.</p>
<h2>Out of scope</h2>
<li>**REST image generation** (`POST /v1/images/generations`) — separate OpenAI-compat endpoint; not wired into chat streaming</li>
<li>**Canvas / A2UI surfaces** — separate feature for agent-driven UI catalogs</li>
<li>**Auto-registering ImageAgent** — agents are configured explicitly by the user</li>
<h2>Tests</h2>
<p>Coverage includes: detection normalisation, b64 fallback, provider callback bridge, `_run_and_broadcast` persistence, media serve route, ImageAgent dict responses, URL dedup.</p>
