  <div id="root"><noscript><h1>Backend Integration Contract</h1>
<p>PraisonAIUI supports a four-layer integration model so standalone mode and SDK-integrated mode can share the same feature APIs.</p>
<h2>Four Layers</h2>
<p>1. **Feature API layer**</p>
<p>Endpoints live in feature modules and expose stable HTTP/CLI behaviour.</p>
<p>2. **Feature manager layer**</p>
<p>Each feature manager keeps local fallback logic for standalone operation.</p>
<p>3. **Backend factory layer**</p>
<p>`praisonaiui.backends` provides optional injected factories (`get_workflow_runner()`, `get_hooks_lister()`, `get_usage_query()`, etc.).</p>
<p>4. **SDK/runtime layer**</p>
<p>PraisonAI or praisonaiagents implementations are used when injected or importable.</p>
<h2>Injection Contract</h2>
<li>Injected backends are optional and must be callable.</li>
<li>Features must keep local fallbacks when injected backends are absent or fail.</li>
<li>Backend call signatures should remain minimal and dict/list based.</li>
<li>Integration should not introduce hard imports in feature modules when a fallback already exists.</li>
<h2>Operational Rule</h2>
<p>When integrated, wrappers should inject backend callables at startup; when standalone, features should run without any backend injection.</p></noscript></div>
