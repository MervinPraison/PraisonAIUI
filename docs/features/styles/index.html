  <div id="root"><noscript><h1>UI Styles</h1>
<p>PraisonAIUI supports 6 distinct UI styles that control how your application looks and behaves. Styles are **auto-detected** from your code — you usually don't need to set them manually.</p>
<h2>Available Styles</h2>
<p>| Style | Layout | Description |</p>
<p>|-------|--------|-------------|</p>
<p>| `chat` | `ChatLayout` | Conversational AI interface with sessions, streaming, profiles |</p>
<p>| `agents` | `AgentUILayout` | Multi-agent playground with tabbed agent/session sidebar |</p>
<p>| `playground` | `PlaygroundLayout` | Side-by-side input/output panels for prompt testing |</p>
<p>| `dashboard` | `DashboardLayout` | Admin panel with custom pages |</p>
<p>| `docs` | `ThreeColumnLayout` | Documentation site with sidebar + TOC |</p>
<p>| `custom` | User-defined | Full control over layout |</p>
<h2>Auto-Detection</h2>
<p>PraisonAIUI automatically detects the best style from your Python code — no flags needed:</p>
<h3>How It Works</h3>
<p>After loading your `app.py`, the CLI inspects which callbacks and agents you registered:</p>
<p>| Your Code Uses | Detected Style |</p>
<p>|---------------|----------------|</p>
<p>| `@profiles` + `register_agent()` | `agents` |</p>
<p>| `@page` decorators | `dashboard` |</p>
<p>| `@reply` only | `chat` |</p>
<h3>Example: Auto-Detected as `agents`</h3>
<h2>Explicit Style Setting</h2>
<h3>From the CLI</h3>
<p>Override auto-detection with `--style`:</p>
<h3>From Python Code</h3>
<p>Use `aiui.set_style()` for styles that can't be auto-detected (e.g., `playground`):</p>
<h2>Priority Order</h2>
<p>When multiple sources specify a style, this priority chain applies:</p>
<p>1. **CLI `--style`** flag (highest — always wins)</p>
<p>2. **`aiui.set_style()`** in Python code</p>
<p>3. **Auto-detection** from registered callbacks/agents</p>
<p>4. **Default:** `chat`</p>
<h2>Chat Layout Modes</h2>
<p>The `chat` style supports additional layout modes for embedding:</p>
<p>| Mode | Description |</p>
<p>|------|-------------|</p>
<p>| `fullscreen` | Full-page chat (default) |</p>
<p>| `sidebar` | Fixed right-side panel |</p>
<p>| `bottom-right` | Floating widget (bottom-right corner) |</p>
<p>| `bottom-left` | Floating widget (bottom-left) |</p>
<p>| `top-right` | Floating widget (top-right) |</p>
<p>| `top-left` | Floating widget (top-left) |</p>
<h2>YAML Configuration</h2>

  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) return;
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Two-stage: immediate for fast plugins, delayed for CDN loads (mermaid)
          setTimeout(notify, 300);
          setTimeout(notify, 3000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { });
    })();
  </script>
