  <div id="root"><noscript><h1>Model Fallback</h1>
<p>Configure **model fallback chains** for high availability — if the primary LLM fails, automatically try the next model in the chain.</p>
<p>![Model Fallback Configuration](../images/model-fallback.png)</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>When a request is sent:</p>
<p>1. Try the **primary model** first</p>
<p>2. If it fails (rate limit, timeout, error), try **fallback 1**</p>
<p>3. Continue down the chain until a model responds</p>
<p>4. If all models fail, return an error</p>
<h2>Model Discovery</h2>
<p>The `ModelFallbackManager` tries to discover models automatically:</p>
<p>1. **LiteLLM** — If installed, reads `litellm.model_list` for configured models</p>
<p>2. **Static catalog** — Falls back to common models (gpt-4o, gpt-4o-mini, claude-3-5-sonnet, gemini-2.0-flash)</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/models` | GET | List available models + current fallback chain |</p>
<p>| `/api/models/fallback` | PUT | Set the fallback chain |</p>
<h3>List Models</h3>
<h2>Related</h2>
<li>[Gateway Chat](gateway-chat.md) — Chat uses models via fallback chain</li>
<li>[Providers](../concepts/providers.md) — LLM provider configuration</li></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        var v = Date.now(); // Cache-busting version parameter
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js?v=' + v).then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
