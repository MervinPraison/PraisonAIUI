  <div id="root"><noscript><h1>Model Fallback</h1>
<p>Configure **model fallback chains** for high availability — if the primary LLM fails, automatically try the next model in the chain.</p>
<p>![Model Fallback Configuration](../images/model-fallback.png)</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>When a request is sent:</p>
<p>1. Try the **primary model** first</p>
<p>2. If it fails (rate limit, timeout, error), try **fallback 1**</p>
<p>3. Continue down the chain until a model responds</p>
<p>4. If all models fail, return an error</p>
<h2>Model Discovery</h2>
<p>The `ModelFallbackManager` tries to discover models automatically:</p>
<p>1. **LiteLLM** — If installed, reads `litellm.model_list` for configured models</p>
<p>2. **Static catalog** — Falls back to common models (gpt-4o, gpt-4o-mini, claude-3-5-sonnet, gemini-2.0-flash)</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/models` | GET | List available models + current fallback chain |</p>
<p>| `/api/models/fallback` | PUT | Set the fallback chain |</p>
