  <div id="root"><noscript><h1>Progressive Web App (PWA)</h1>
<p>Install PraisonAIUI as a **native-like app** on any device — manifest, service worker, and offline support.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>The PWA feature automatically serves three endpoints:</p>
<p>| URL | Purpose |</p>
<p>|-----|---------|</p>
<p>| `/manifest.json` | Web Application Manifest for installability |</p>
<p>| `/sw.js` | Service Worker for caching and offline support |</p>
<p>| `/api/pwa/config` | PWA configuration for frontend consumption |</p>
<h3>Service Worker Strategy</h3>
<p>The service worker uses a **cache-first** strategy for the app shell and a **network-first** strategy for navigation:</p>
<p>1. **Install**: Pre-caches the root URL and health endpoint</p>
<p>2. **Activate**: Cleans up old caches</p>
<p>3. **Fetch**: Navigation requests fall back to cached root for offline support</p>
<h2>Configuration</h2>
<h2>Generated Manifest</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/manifest.json` | GET | Web Application Manifest |</p>
<p>| `/sw.js` | GET | Service Worker JavaScript |</p>
<p>| `/api/pwa/config` | GET | PWA configuration details |</p>
