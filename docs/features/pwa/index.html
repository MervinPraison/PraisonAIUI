  <div id="root"><noscript><h1>Progressive Web App (PWA)</h1>
<p>Install PraisonAIUI as a **native-like app** on any device — manifest, service worker, and offline support.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>The PWA feature automatically serves three endpoints:</p>
<p>| URL | Purpose |</p>
<p>|-----|---------|</p>
<p>| `/manifest.json` | Web Application Manifest for installability |</p>
<p>| `/sw.js` | Service Worker for caching and offline support |</p>
<p>| `/api/pwa/config` | PWA configuration for frontend consumption |</p>
<h3>Service Worker Strategy</h3>
<p>The service worker uses a **cache-first** strategy for the app shell and a **network-first** strategy for navigation:</p>
<p>1. **Install**: Pre-caches the root URL and health endpoint</p>
<p>2. **Activate**: Cleans up old caches</p>
<p>3. **Fetch**: Navigation requests fall back to cached root for offline support</p>
<h2>Configuration</h2>
<h2>Generated Manifest</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/manifest.json` | GET | Web Application Manifest |</p>
<p>| `/sw.js` | GET | Service Worker JavaScript |</p>
<p>| `/api/pwa/config` | GET | PWA configuration details |</p>
<h2>Related</h2>
<li>[Theme System](theme-system.md) — Colors used by PWA manifest</li></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) return;
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Two-stage: immediate for fast plugins, delayed for CDN loads (mermaid)
          setTimeout(notify, 300);
          setTimeout(notify, 3000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { });
    })();
  </script>
