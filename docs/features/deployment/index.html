<h2>Environment Variables</h2>
<p>| Variable | Default | Description |</p>
<p>|----------|---------|-------------|</p>
<p>| `AIUI_DATA_DIR` | `~/.praisonaiui` | Data directory for config, sessions, logs |</p>
<p>| `AIUI_PORT` | `8082` | Server port (Docker only) |</p>
<p>| `AIUI_HOST` | `0.0.0.0` | Server bind address (Docker only) |</p>
<p>| `AUTH_ENFORCE` | `false` | Enforce Bearer token auth on `/api/*` routes |</p>
<p>| `OPENAI_API_KEY` | — | OpenAI API key for LLM provider |</p>
<h3>Auth Enforcement</h3>
<p>When `AUTH_ENFORCE=true`, all `/api/*` routes require a valid Bearer token in the `Authorization` header:</p>
<p>**Exempt paths** (always accessible without auth):</p>
<li>`/health`, `/api/health` — health checks</li>
<li>`/api/auth/login`, `/login` — login endpoints</li>
<li>`/api/protocol`, `/api/protocol/negotiate` — protocol discovery</li>
<h2>Configuration</h2>
<h3>Config File Location</h3>
<p>The config file is located at `AIUI_DATA_DIR/config.yaml` (default: `~/.praisonaiui/config.yaml`).</p>
<h3>Config Structure</h3>
<h3>Site Title Customization</h3>
<p>The site title is configurable via `site.title` in config.yaml:</p>
<p>This affects:</p>
<li>HTML `<title>` tag</li>
<li>Dashboard header</li>
<li>`/ui-config.json` response</li>

<h2>Security</h2>
<h3>Auth Modes</h3>
<p>AIUI supports multiple authentication modes:</p>
<p>| Mode | Description |</p>
<p>|------|-------------|</p>
<p>| `none` | No authentication (default) |</p>
<p>| `api_key` | API key in `X-API-Key` header or `api_key` query param |</p>
<p>| `session` | Session token in `Authorization: Bearer <token>` header |</p>
<p>| `password` | Username/password login |</p>
<h3>API Key Management</h3>
<h3>Network Considerations</h3>
<li>**Internal networks**: Use `AUTH_ENFORCE=false` if behind a trusted reverse proxy</li>
<li>**Public exposure**: Always set `AUTH_ENFORCE=true` and use HTTPS</li>
<li>**Load balancers**: Health check path is `/health` (exempt from auth)</li>
<h2>Managed Hosting</h2>
<h3>Required Endpoints</h3>
<p>Hosting platforms should expose these endpoints:</p>
<p>| Endpoint | Purpose |</p>
<p>|----------|---------|</p>
<p>| `/health` | Health check (returns `{"status": "healthy"}`) |</p>
<p>| `/api/protocol` | Protocol version and capabilities |</p>
<p>| `/api/protocol/negotiate` | Capability negotiation |</p>
<p>| `/api/features` | List of registered features |</p>
<h3>Protocol Discovery</h3>
<h3>Minimum Viable Deployment</h3>
<p>For a minimal AIUI deployment:</p>
<p>1. **Required**: `OPENAI_API_KEY` environment variable</p>
<p>2. **Recommended**: Persistent volume for `AIUI_DATA_DIR`</p>
<p>3. **Optional**: `AUTH_ENFORCE=true` for multi-tenant environments</p></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        var v = Date.now(); // Cache-busting version parameter
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js?v=' + v).then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
