  <div id="root"><noscript><h1>Code Execution</h1>
<p>**Sandboxed code execution** with language allowlists and SDK integration. Wraps `praisonaiagents.tools.code.execute_code` when available, falls back to safe simulation mode.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>1. Code is submitted with a target language</p>
<p>2. The manager checks if the language is in the **allowlist** (default: python, javascript, bash)</p>
<p>3. If `praisonaiagents` is installed, delegates to `execute_code` for real execution</p>
<p>4. Otherwise returns a simulation response with the code size</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/code/languages` | GET | List supported languages |</p>
<p>| `/api/code/execute` | POST | Execute code in sandbox |</p>
<h3>POST /api/code/execute</h3>
