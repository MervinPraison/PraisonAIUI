  <div id="root"><noscript><h1>Subagent Tree View</h1>
<p>Visualize **agent hierarchies** — see which agents spawn subagents, track their status, and monitor the full execution tree.</p>
<p>![Subagent Tree View](../images/subagent-tree.png)</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>When agents spawn subagents during execution, each spawn is registered with the `SubagentManager`:</p>
<p>1. **Parent agent** spawns a **child agent**</p>
<p>2. The spawn is recorded with session ID, timestamp, and status</p>
<p>3. A tree structure is built from spawn records</p>
<p>4. The tree can be queried per-session via the REST API</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/subagents` | GET | List all spawn events |</p>
<p>| `/api/subagents/{session_id}` | GET | Get tree for a session |</p>
