<body>
  <div id="root"><noscript><h1>Subagent Tree View</h1>
<p>Visualize **agent hierarchies** — see which agents spawn subagents, track their status, and monitor the full execution tree.</p>
<p>![Subagent Tree View](../images/subagent-tree.png)</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>When agents spawn subagents during execution, each spawn is registered with the `SubagentManager`:</p>
<p>1. **Parent agent** spawns a **child agent**</p>
<p>2. The spawn is recorded with session ID, timestamp, and status</p>
<p>3. A tree structure is built from spawn records</p>
<p>4. The tree can be queried per-session via the REST API</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/subagents` | GET | List all spawn events |</p>
<p>| `/api/subagents/{session_id}` | GET | Get tree for a session |</p>
<h3>Get Tree</h3>
<h2>Related</h2>
<li>[Gateway Chat](gateway-chat.md) — Chat triggers agent execution</li>
<li>[Protocols](protocols.md) — Feature protocol system</li></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) return;
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Two-stage: immediate for fast plugins, delayed for CDN loads (mermaid)
          setTimeout(notify, 300);
          setTimeout(notify, 3000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { });
    })();
  </script>
