<body>
  <div id="root"><noscript><h1>Config Hot-Reload</h1>
<p>Live configuration reloading — watch YAML config files for changes and apply updates **without restarting the server**.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>1. **ConfigWatcher** polls the config file at a configurable interval (default: 2 seconds)</p>
<p>2. On each poll, it computes the file's SHA-256 hash</p>
<p>3. If the hash differs from the previous check, it triggers all registered reload callbacks</p>
<p>4. Callbacks can update feature settings, re-register agents, or reload themes</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/config/watcher` | GET | Get watcher status |</p>
<p>| `/api/config/watcher` | POST | Start/stop the watcher |</p>
<p>| `/api/config/reload` | POST | Force a manual reload |</p>
<h3>Watcher Status</h3>
<h3>Force Reload</h3>
<h2>Related</h2>
<li>[YAML Configuration](../concepts/configuration.md) — Config file format</li>
<li>[Protocols](protocols.md) — Feature protocol system</li></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        var v = Date.now(); // Cache-busting version parameter
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js?v=' + v).then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
