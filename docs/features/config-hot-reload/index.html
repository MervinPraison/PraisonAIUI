  <div id="root"><noscript><h1>Config Hot-Reload</h1>
<p>Live configuration reloading — watch YAML config files for changes and apply updates **without restarting the server**.</p>
<h2>Quick Start</h2>
<h2>How It Works</h2>
<p>1. **ConfigWatcher** polls the config file at a configurable interval (default: 2 seconds)</p>
<p>2. On each poll, it computes the file's SHA-256 hash</p>
<p>3. If the hash differs from the previous check, it triggers all registered reload callbacks</p>
<p>4. Callbacks can update feature settings, re-register agents, or reload themes</p>
<h2>Configuration</h2>
<h2>REST API</h2>
<p>| Endpoint | Method | Description |</p>
<p>|----------|--------|-------------|</p>
<p>| `/api/config/watcher` | GET | Get watcher status |</p>
<p>| `/api/config/watcher` | POST | Start/stop the watcher |</p>
<p>| `/api/config/reload` | POST | Force a manual reload |</p>
