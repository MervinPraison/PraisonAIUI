  <div id="root"><noscript><h1>Providers</h1>
<p>PraisonAIUI uses a **provider protocol** â€” a simple abstraction that lets you plug in any AI backend.</p>
<h2>Architecture</h2>
<p>The provider protocol is the **only contract** between the frontend and any AI backend. All dashboard pages (`/api/overview`, `/api/config`, `/api/logs`, etc.) are provider-agnostic â€” they always work regardless of which backend is active. The provider only handles agent execution (`run()`), agent listing (`list_agents()`), and health checks (`health()`).</p>
<h2>How It Works</h2>
<p>1. User sends a message â†’ `POST /run`</p>
<p>2. Server calls `provider.run(message)` on the active provider</p>
<p>3. Provider yields `RunEvent` objects (start, content, tool calls, reasoning, completion)</p>
<p>4. Server serialises each `RunEvent` to an SSE `data:` frame</p>
<p>5. Frontend `useSSE.ts` parses events and renders components</p>

<p>PraisonAI is the default provider. It wraps the `@aiui.reply` callback system:</p>
<p>No extra config needed â€” `PraisonAIProvider` is used automatically.</p>

<h3>With Tool Calls and Reasoning</h3>
<h2>RunEvent Reference</h2>
<p>Every event has a `type` field and optional payload fields:</p>
<p>| Field | Type | Used By |</p>
<p>|-------|------|---------|</p>
<p>| `type` | `RunEventType` | All events |</p>
<p>| `content` | `str` | `RUN_COMPLETED`, `RUN_CONTENT` |</p>
<p>| `token` | `str` | `RUN_CONTENT` (streaming) |</p>
<p>| `name` | `str` | `TOOL_CALL_*` |</p>
<p>| `args` | `dict` | `TOOL_CALL_STARTED` |</p>
<p>| `result` | `any` | `TOOL_CALL_COMPLETED` |</p>
<p>| `step` | `str` | `REASONING_STEP` |</p>
<p>| `error` | `str` | `RUN_ERROR` |</p>
<p>| `agent_name` | `str` | Multi-agent events |</p>
<p>| `extra_data` | `dict` | Custom payload |</p>
<h3>Event Types (27 total)</h3>
<p>=== "Agent Events"</p>
<p>| Type | Description |</p>
<p>|------|-------------|</p>
<p>| `run_started` | Agent run begins |</p>
<p>| `run_content` | Streaming token or content chunk |</p>
<p>| `run_completed` | Agent run finished |</p>
<p>| `run_error` | Error occurred |</p>
<p>| `run_cancelled` | User cancelled |</p>
<p>| `tool_call_started` | Tool invocation started |</p>
<p>| `tool_call_completed` | Tool returned result |</p>
<p>| `reasoning_started` | Thinking begun |</p>
<p>| `reasoning_step` | Individual reasoning step |</p>
<p>| `reasoning_completed` | Thinking finished |</p>
<p>| `memory_update_started` | Memory write begun |</p>
<p>| `memory_update_completed` | Memory write done |</p>
<p>| `updating_memory` | Memory being updated |</p>
<p>| `run_paused` | Run paused (e.g. waiting for user) |</p>
<p>| `run_continued` | Run resumed |</p>
<p>=== "Team Events"</p>
<p>| Type | Description |</p>
<p>|------|-------------|</p>
<p>| `team_run_started` | Team run begins |</p>
<p>| `team_run_content` | Team streaming content |</p>
<p>| `team_run_completed` | Team run finished |</p>
<p>| `team_run_error` | Team error |</p>
<p>| `team_run_cancelled` | Team cancelled |</p>
<p>| `team_tool_call_started` | Team tool call started |</p>
<p>| `team_tool_call_completed` | Team tool call done |</p>
<p>| `team_reasoning_started` | Team reasoning begun |</p>
<p>| `team_reasoning_step` | Team reasoning step |</p>
<p>| `team_reasoning_completed` | Team reasoning done |</p>
<p>| `team_memory_update_started` | Team memory update started |</p>
<p>| `team_memory_update_completed` | Team memory update done |</p>
<h2>API Summary</h2>
<h3>`BaseProvider` (abstract)</h3>
<p>:   Subclass and implement `run()` to create a custom provider.</p>
<p>| Method | Description |</p>
<p>|--------|-------------|</p>
<p>| `run(message, *, session_id, agent_name, **kw)` | **Required.** Async generator yielding `RunEvent` objects |</p>
<p>| `list_agents()` | Optional. Returns list of available agents |</p>
<p>| `health()` | Optional. Returns health check dict |</p>
<h3>`RunEvent` (dataclass)</h3>
<p>:   Structured event with `type: RunEventType` and optional payload fields (see table above).</p>
<li>`to_dict()` â†’ serialise to JSON-compatible dict matching the frontend `SSEEvent` interface</li>
<h3>`RunEventType` (enum)</h3>
<p>:   27 string values matching the frontend `types.ts` â€” see Agent Events and Team Events tabs above.</p>
<h3>Helper Functions</h3>
<p>| Function | Description |</p>
<p>|----------|-------------|</p>
<p>| `praisonaiui.set_provider(provider)` | Set the active provider |</p>
<p>| `praisonaiui.get_provider()` | Get the active provider (lazy-inits `PraisonAIProvider`) |</p></noscript></div>
  <script>
    // AIUI Plugin System â€” inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass â€” no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
