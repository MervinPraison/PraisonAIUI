  <div id="root"><noscript><h1>Templates & Layouts</h1>
<p>Learn how templates and layouts work in PraisonAIUI.</p>
<h2>Overview</h2>
<p>Templates define the structure of your pages by combining:</p>
<li>A **layout** - The structural container</li>
<li>**Slots** - Pluggable content areas</li>
<h2>Layouts</h2>
<p>PraisonAIUI provides four layouts:</p>
<p>| Layout | Description |</p>
<p>|--------|-------------|</p>
<p>| `ThreeColumnLayout` | Sidebar + Content + TOC (classic docs) |</p>
<p>| `TwoColumnLayout` | Sidebar + Content (no TOC) |</p>
<p>| `CenteredLayout` | Centered content, no sidebar |</p>
<p>| `FullWidthLayout` | Full-width content |</p>
<h3>ThreeColumnLayout</h3>
<p>The classic documentation layout with sidebar and TOC.</p>
<h3>TwoColumnLayout</h3>
<p>Sidebar + Content without the right TOC column.</p>
<h3>CenteredLayout</h3>
<p>Centered content with no sidebar, ideal for articles/blogs.</p>
<h3>FullWidthLayout</h3>
<p>Full-width content without sidebar.</p>
<h2>Defining Templates</h2>
<h2>Slot Assignment</h2>
<p>Slots can be assigned in two ways:</p>

  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
