  <div id="root"><noscript><h1>CLI API Reference</h1>
<p>Complete reference for the `aiui` Python CLI.</p>
<h2>Commands</h2>
<h3>init</h3>
<p>Initialize a new project.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--template, -t` | string | `minimal` | Template: minimal, docs, marketing |</p>
<p>| `--force, -f` | flag | `false` | Overwrite existing files |</p>
<h3>validate</h3>
<p>Validate configuration file.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--config, -c` | path | `aiui.template.yaml` | Config file path |</p>
<p>| `--strict` | flag | `false` | Strict validation mode |</p>
<h3>build</h3>
<p>Build manifests from configuration.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--config, -c` | path | `aiui.template.yaml` | Config file path |</p>
<p>| `--output, -o` | path | `aiui` | Output directory |</p>
<p>| `--minify` | flag | `false` | Minify JSON output |</p>
<h3>dev</h3>
<p>Start development mode with file watching.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--config, -c` | path | `aiui.template.yaml` | Config file path |</p>
<p>| `--port, -p` | int | `3000` | Dev server port |</p>
<h3>run</h3>
<p>Run the AI chat server with your app or config.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--port, -p` | int | `8000` | Server port |</p>
<p>| `--host` | string | `127.0.0.1` | Host to bind to |</p>
<p>| `--reload, -r` | flag | `false` | Auto-reload on file changes |</p>
<p>| `--style, -s` | string | `chat` | UI style: `chat`, `docs`, `agents`, `playground`, `dashboard`, `custom` |</p>
<p>| `--backend, -b` | string | `standalone` | Backend: `standalone` or `praisonai` |</p>
<p>| `--datastore, -d` | string | `memory` | Data persistence: `memory`, `json`, `json:/path` |</p>
<p>| `--output, -o` | path | `aiui` | Output directory for static files |</p>
<p>**Style auto-detection:** When `--style` is not provided, the style is automatically detected from your code. See [Styles](../features/styles.md) for details.</p>

  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      function removeAntiFlicker() {
        var af = document.getElementById('aiui-anti-flicker');
        if (af) af.remove();
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) { removeAntiFlicker(); return; }
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Immediate first pass — no delay
          notify();
          // Remove anti-flicker now that plugins have rendered
          removeAntiFlicker();
          // Delayed pass for CDN-loaded plugins (mermaid, syntax-highlight)
          setTimeout(notify, 2000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { removeAntiFlicker(); });
    })();
  </script>
