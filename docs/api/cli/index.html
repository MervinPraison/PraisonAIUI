  <div id="root"><noscript><h1>CLI API Reference</h1>
<p>Complete reference for the `aiui` Python CLI.</p>
<h2>Commands</h2>
<h3>init</h3>
<p>Initialize a new project.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--template, -t` | string | `minimal` | Template: minimal, docs, marketing |</p>
<p>| `--force, -f` | flag | `false` | Overwrite existing files |</p>
<h3>validate</h3>
<p>Validate configuration file.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--config, -c` | path | `aiui.template.yaml` | Config file path |</p>
<p>| `--strict` | flag | `false` | Strict validation mode |</p>
<h3>build</h3>
<p>Build manifests from configuration.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--config, -c` | path | `aiui.template.yaml` | Config file path |</p>
<p>| `--output, -o` | path | `aiui` | Output directory |</p>
<p>| `--minify` | flag | `false` | Minify JSON output |</p>
<h3>dev</h3>
<p>Start development mode with file watching.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--config, -c` | path | `aiui.template.yaml` | Config file path |</p>
<p>| `--port, -p` | int | `3000` | Dev server port |</p>
<h3>run</h3>
<p>Run the AI chat server with your app or config.</p>
<p>| Option | Type | Default | Description |</p>
<p>|--------|------|---------|-------------|</p>
<p>| `--port, -p` | int | `8000` | Server port |</p>
<p>| `--host` | string | `127.0.0.1` | Host to bind to |</p>
<p>| `--reload, -r` | flag | `false` | Auto-reload on file changes |</p>
<p>| `--style, -s` | string | `chat` | UI style: `chat`, `docs`, `agents`, `playground`, `dashboard`, `custom` |</p>
<p>| `--backend, -b` | string | `standalone` | Backend: `standalone` or `praisonai` |</p>
<p>| `--datastore, -d` | string | `memory` | Data persistence: `memory`, `json`, `json:/path` |</p>
<p>| `--output, -o` | path | `aiui` | Output directory for static files |</p>
<p>**Style auto-detection:** When `--style` is not provided, the style is automatically detected from your code. See [Styles](../features/styles.md) for details.</p>
