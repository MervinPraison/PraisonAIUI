<h2>CLI Integration Tests (`aiui test`)</h2>
<p>PraisonAIUI includes built-in integration tests via</p>
<p>`aiui test`. These run against a live server and verify chat, memory, sessions,</p>
<p>and API endpoint health.</p>
<h3>Quick Start</h3>
<h3>Available Subcommands</h3>
<p>| Command | What It Tests |</p>
<p>|---------|---------------|</p>
<p>| `aiui test endpoints` | API endpoint availability (/health, /api/features, /api/sessions, /api/chat) |</p>
<p>| `aiui test chat` | Message sending, session history isolation, context recall |</p>
<p>| `aiui test memory` | Cross-session persistent memory (store + recall facts) |</p>
<p>| `aiui test sessions` | Session file persistence (survives server restarts) |</p>
<p>| `aiui test all` | Runs all of the above in sequence |</p>
<h3>Options</h3>
<li>`--server` / `-s` — Server URL (default: `http://127.0.0.1:8082`)</li>
<li>`--timeout` / `-t` — Response timeout in seconds (default: `30`)</li>
<h3>Example Output</h3>
<h3>Test Details</h3>
<p>**Endpoints** (6 checks, 2 optional skips):</p>
<li>`GET /api/features` — Feature registry health</li>
<li>`GET /api/sessions` — Session listing</li>
<li>`GET /api/chat/history` — Empty session history</li>
<li>`POST /api/chat/send` — Chat message dispatch</li>
<li>`GET /api/provider/health` — _(optional, skipped if no provider)_</li>
<li>`GET /api/provider/agents` — _(optional, skipped if no provider)_</li>
<li>`GET /health` — Server health check</li>
<p>**Chat** (8 checks):</p>
<li>Sends a message to Session A, verifies response in history</li>
<li>Creates Session B, verifies history isolation (no cross-session leakage)</li>
<li>Verifies Session A retains context from earlier messages</li>
<p>**Memory** (2 checks):</p>
<li>Sends a fact to Session 1 ("remember my name")</li>
<li>Asks a recall question in Session 2, verifies cross-session memory</li>
<p>**Sessions** (4 checks):</p>
<li>Sends a message and verifies session file is created on disk</li>
<li>Verifies history API returns persisted messages</li>
