  <div id="root"><noscript><h1>Health API Reference</h1>
<p>The AIUI health API provides endpoints to monitor server and provider health status.</p>
<h2>Health Status Values</h2>
<p>The following status values are used throughout the health API:</p>
<p>| Status | Meaning | Color Code |</p>
<p>|--------|---------|------------|</p>
<p>| `"ok"` | Service is functioning normally | Green |</p>
<p>| `"healthy"` | Service is functioning normally (legacy) | Green |</p>
<p>| `"degraded"` | Service is partially functional | Yellow |</p>
<p>| `"error"` | Service has errors | Red |</p>
<p>| `"unknown"` | Status cannot be determined | Yellow |</p>
<p>> **Note:** Both `"ok"` and `"healthy"` indicate successful operation. The system accepts either value for backward compatibility.</p>
<h2>Endpoints</h2>
<h3>GET /health</h3>
<p>Returns the overall server health status.</p>
<p>**Response:**</p>
<h3>GET /api/provider</h3>
<p>Returns information about the active AI provider.</p>
<p>**Response:**</p>
<h3>GET /api/provider/health</h3>
<p>Returns detailed JSON health information from the provider gateway. Always</p>
<p>responds with `Content-Type: application/json`. The base fields from the</p>
<p>provider's `health()` payload are merged with the normalised fields below.</p>
<p>**Response:**</p>
<p>| Field | Type | Description |</p>
<p>|-------|------|-------------|</p>
<p>| `status` | string | One of the health status values above. |</p>
<p>| `type` | string | Provider type (from `provider` field, falls back to class name). |</p>
<p>| `agents` | integer | Count of agents reported by the provider. |</p>
<p>| `detail` | string | Human-readable detail; `"ok"` for healthy providers. |</p>
<p>> **Note:** Any unmatched `/api/*` path returns a JSON `404` (never the SPA</p>
<p>> HTML shell), so API clients can rely on parsing the response body.</p>
<h2>CLI Commands</h2>
<h3>health-check</h3>
<p>Check server health status:</p>
<p>The command displays:</p>
<li>Green panel for `"ok"` or `"healthy"` status</li>
<li>Yellow panel for other statuses</li>
<li>Red error message if server is unreachable</li>
<h3>doctor</h3>
<p>Run comprehensive diagnostics:</p>
<p>The doctor command checks:</p>
<p>1. Server Health</p>
<p>2. Provider Status</p>
<p>3. Gateway Status</p>
<p>4. Features Loaded</p>
<p>5. Config Store</p>
<p>6. Datastore</p>
<p>7. Channels</p>
