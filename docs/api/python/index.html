  <div id="root"><noscript><h1>Python SDK API</h1>
<p>Reference for `import praisonaiui as aiui`.</p>
<h2>Server Configuration</h2>
<p>These functions configure the server. Call them at module level in your `app.py`, before the server starts.</p>
<h3>`aiui.set_style(style)`</h3>
<p>Set the UI style.</p>
<p>| Parameter | Type | Values |</p>
<p>|-----------|------|--------|</p>
<p>| `style` | `str` | `"chat"`, `"dashboard"`, `"agents"`, `"playground"`, `"docs"`, `"custom"` |</p>
<p>Priority: `set_style()` → CLI `--style` flag → auto-detection.</p>
<h3>`aiui.set_branding(title, logo)`</h3>
<p>Configure the sidebar branding (title text and logo emoji).</p>
<p>| Parameter | Type | Default |</p>
<p>|-----------|------|---------|</p>
<p>| `title` | `str` | `"PraisonAI"` |</p>
<p>| `logo` | `str` | `"🦞"` |</p>
<p>Also configurable via `config.yaml`:</p>
<p>---</p>
<h3>`aiui.set_datastore(store)`</h3>
<p>Set the persistence backend for sessions and messages.</p>
<p>---</p>
<h3>`aiui.set_provider(provider)`</h3>
<p>Set the AI provider for chat completions.</p>
<p>---</p>
<h3>`aiui.register_agent(config)`</h3>
<p>Register an AI agent for the dashboard. Agents appear in the sidebar and can be selected for chat.</p>
<p>---</p>
<h3>`aiui.remove_page(page_id)`</h3>
<p>Remove a page from the sidebar.</p>
<p>---</p>
<h3>`aiui.set_chat_mode(mode, *, position, size, resizable, minimized)`</h3>
<p>Configure chat window display mode — full page, floating window, or sidebar panel.</p>
<p>| Parameter | Type | Default | Description |</p>
<p>|-----------|------|---------|-------------|</p>
<p>| `mode` | `str` | `"fullpage"` | `"fullpage"`, `"floating"`, or `"sidebar"` |</p>
<p>| `position` | `tuple[int, int]` | `(20, 20)` | (bottom, right) pixel offset for floating mode |</p>
<p>| `size` | `tuple[int, int]` | `(400, 500)` | (width, height) initial size for floating mode |</p>
<p>| `resizable` | `bool` | `True` | Allow resizing the floating window |</p>
<p>| `minimized` | `bool` | `False` | Start minimized (floating mode only) |</p>
<p>---</p>
<h3>`aiui.set_sidebar_config(*, collapsible, default_collapsed, width, min_width, max_width)`</h3>
<p>Configure sidebar behavior and dimensions.</p>
<p>| Parameter | Type | Default | Description |</p>
<p>|-----------|------|---------|-------------|</p>
<p>| `collapsible` | `bool` | `True` | Allow sidebar to be collapsed |</p>
<p>| `default_collapsed` | `bool` | `False` | Start with sidebar collapsed |</p>
<p>| `width` | `int` | `260` | Default sidebar width in pixels |</p>
<p>| `min_width` | `int` | `200` | Minimum width when resizing |</p>
<p>| `max_width` | `int` | `360` | Maximum width when resizing |</p>
<p>---</p>
<h3>`aiui.set_brand_color(color)`</h3>
<p>Set the brand/primary accent color. Overrides the theme's default accent.</p>
<p>| Parameter | Type | Description |</p>
<p>|-----------|------|-------------|</p>
<p>| `color` | `str` | Hex color (e.g. `"#6366f1"`) or CSS color value |</p>
<p>---</p>
<h3>`aiui.set_chat_features(*, history, streaming, file_upload, audio, reasoning, tools, multimedia, feedback)`</h3>
<p>Configure which chat features are enabled in the UI.</p>
<p>| Parameter | Type | Default | Description |</p>
<p>|-----------|------|---------|-------------|</p>
<p>| `history` | `bool` | `True` | Show session history sidebar |</p>
<p>| `streaming` | `bool` | `True` | Enable streaming responses |</p>
<p>| `file_upload` | `bool` | `False` | Show file upload button |</p>
<p>| `audio` | `bool` | `False` | Show audio input button |</p>
<p>| `reasoning` | `bool` | `True` | Show reasoning/thinking steps |</p>
<p>| `tools` | `bool` | `True` | Show tool call displays |</p>
<p>| `multimedia` | `bool` | `True` | Enable multimedia rendering |</p>
<p>| `feedback` | `bool` | `False` | Show feedback buttons |</p>
<p>---</p>
<h3>`aiui.set_dashboard(*, sidebar, page_header)`</h3>
<p>Configure dashboard layout options.</p>
<p>| Parameter | Type | Default | Description |</p>
<p>|-----------|------|---------|-------------|</p>
<p>| `sidebar` | `bool` | `True` | Show the left sidebar navigation |</p>
<p>| `page_header` | `bool` | `True` | Show the page title/description header |</p>
<p>---</p>
<h3>`aiui.register_theme(name, variables)`</h3>
<p>Register a custom theme preset. The theme becomes available in the theme picker UI and via `/api/theme`.</p>
<p>| Parameter | Type | Description |</p>
<p>|-----------|------|-------------|</p>
<p>| `name` | `str` | Unique theme name (e.g. `"ocean"`, `"sunset"`) |</p>
<p>| `variables` | `dict[str, str]` | Dict with at least `{"accent": "#hexcolor"}` |</p>
<p>See [CSS Architecture](../features/css-architecture.md) for all available CSS variables.</p>
<p>---</p>
<h3>`aiui.set_custom_js(path)`</h3>
<p>Inject a local JavaScript file into the UI. Reads the file at `path` and</p>
<p>serves it at `/custom.js`. A `<script src="/custom.js">` tag is injected</p>
<p>into the host HTML **after** the plugin loader, so `window.aiui` and all</p>
<p>registry APIs (`registerView`, `registerComponent`) are ready when your</p>
<p>code runs.</p>
<p>| Parameter | Type | Description |</p>
<p>|-----------|------|-------------|</p>
<p>| `path` | `str \| Path` | Local filesystem path to a `.js` file |</p>
<p>Raises `FileNotFoundError` if the path does not exist.</p>
<p>Where `plugin.js` uses the client-side extension APIs:</p>
<p>---</p>
<h3>`aiui.register_component_schema(component_type, schema)`</h3>
<p>Register a JSON Schema contract for a component dict. Built-in schemas</p>
<p>are auto-derived from every `aiui.ui.*` builder at startup; user schemas</p>
<p>take priority and are merged on top.</p>
<p>| Parameter | Type | Description |</p>
<p>|-----------|------|-------------|</p>
<p>| `component_type` | `str` | Component type string (e.g. `"timeline"`) |</p>
<p>| `schema` | `dict` | JSON Schema dict (Draft 2020-12 compatible) |</p>
<h3>`aiui.get_component_schemas()`</h3>
<p>Returns the merged registry as a `dict[str, dict]`. Also available as a</p>
<p>JSON endpoint: `GET /api/components/schemas`.</p>
<p>---</p>
<h3>`aiui.prompt(question, *, options=None, timeout=300.0)`</h3>
<p>Pause the agent and wait for the user to answer. Preferred entry point</p>
<p>for interactive agent flows — supersedes the legacy `AskUserMessage`</p>
<p>class.</p>
<p>| Parameter | Type | Description |</p>
<p>|-----------|------|-------------|</p>
<p>| `question` | `str` | Text shown to the user. |</p>
<p>| `options`  | `list[str] \| None` | Optional list of choices. When given, the user picks one; otherwise they type free text. |</p>
<p>| `timeout`  | `float` | Seconds to wait before giving up. Default 300 (5 min). |</p>
<p>Returns a `PromptResult` dataclass (`text`, `choice`, `message_id`).</p>
<p>The result is truthy when the user answered, falsy on timeout.</p>
<p>---</p>
<h3>`aiui.error(content, *, details=None)`</h3>
<p>Emit an error message to the chat. A thin helper around `Message` with</p>
<p>`metadata={"kind": "error"}` — keeps the public surface small.</p>
<p>---</p>
<h3>`aiui.configure(*, datastore=None, branding=None, theme=None, chat=None, custom_css=None, custom_js=None, style=None)`</h3>
<p>One-stop configuration function. Every keyword is optional, so you only</p>
<p>set what you need. Replaces the dozen individual `set_*` setters for</p>
<p>most common cases (the `set_*` functions remain for advanced control).</p>
<p>| Parameter | Type | Description |</p>
<p>|-----------|------|-------------|</p>
<p>| `datastore` | `str` | Storage backend: `"memory"`, `"json"`, `"json:/path"`, `"sdk"`, `"sdk:/path"`. |</p>
<p>| `branding`  | `dict` | Forwarded to `set_branding(...)`. Keys: `title`, `logo`, `subtitle`. |</p>
<p>| `theme`     | `dict` | Forwarded to `set_theme(...)`. Keys: `preset`, `dark`/`dark_mode`, `radius`, `brand_color`. |</p>
<p>| `chat`      | `dict` | Forwarded to `set_chat_features(...)`. Keys: `feedback`, `mode`, plus any chat-feature flag. |</p>
<p>| `custom_css`| `str \| Path` | Path to a CSS file; same as `set_custom_css`. |</p>
<p>| `custom_js` | `str \| Path` | Path to a JS file; same as `set_custom_js`. |</p>
<p>| `style`     | `str` | UI style — `"chat"`, `"dashboard"`, etc. |</p>
<p>---</p>
<h2>Callback Decorators</h2>
<h3>`@aiui.reply`</h3>
<p>Handle incoming chat messages. This is the core callback.</p>
<p>The `message` object has:</p>
<li>`message.content` — user's text</li>
<li>`message.session_id` — session identifier</li>
<li>`message.images` — attached images (if any)</li>
<p>---</p>
<h3>`@aiui.welcome`</h3>
<p>Send a welcome message when a user connects.</p>
<p>---</p>
<h3>`@aiui.goodbye`</h3>
<p>Cleanup when a user disconnects.</p>
<p>---</p>
<h3>`@aiui.starters`</h3>
<p>Define conversation starters shown to new users.</p>
<p>---</p>
<h3>`@aiui.profiles`</h3>
<p>Define chat profiles (agent personas users can choose).</p>
<p>---</p>
<h3>`@aiui.page(slug, title, icon, group, order)`</h3>
<p>Register a custom dashboard page.</p>
<p>---</p>
<h3>`@aiui.on(event)`</h3>
<p>Listen for server events.</p>
<p>---</p>
<h3>`@aiui.login`</h3>
<p>Handle authentication.</p>
<p>---</p>
<h3>`@aiui.settings`</h3>
<p>Provide user settings.</p>
<p>---</p>
<h3>`@aiui.resume`</h3>
<p>Resume interrupted sessions.</p>
<p>---</p>
<h2>Message Functions</h2>
<p>Async functions for sending messages to the user. Call inside callback handlers.</p>
<p>| Function | Purpose |</p>
<p>|----------|---------|</p>
<p>| `await aiui.say(text)` | Send a complete message |</p>
<p>| `await aiui.stream(text)` | Stream a response progressively |</p>
<p>| `await aiui.stream_token(token)` | Stream token-by-token |</p>
<p>| `await aiui.think(text)` | Show a thinking indicator |</p>
<p>| `await aiui.ask(question)` | Ask user a question (returns answer) |</p>
<p>| `await aiui.image(url)` | Send an image |</p>
<p>| `await aiui.audio(url)` | Send audio |</p>
<p>| `await aiui.video(url)` | Send video |</p>
<p>| `await aiui.file(url)` | Send a file |</p>
<p>| `await aiui.action_buttons(buttons)` | Show action buttons |</p>
<p>| `await aiui.tool(name, data)` | Show tool call result |</p>
<p>---</p>
<h2>UI Components</h2>
<p>Build custom page layouts with UI components.</p>
<p>| Component | Usage |</p>
<p>|-----------|-------|</p>
<p>| `aiui.layout(children)` | Root container for a page |</p>
<p>| `aiui.card(title, *, value, footer)` | Metric/stat card with title, value, and optional footer |</p>
<p>| `aiui.columns(children)` | Horizontal column layout |</p>
<p>| `aiui.chart(data, type)` | Chart (line, bar, pie) |</p>
<p>| `aiui.table(headers, rows)` | Data table |</p>
<p>| `aiui.text(content)` | Text block |</p>
<p>See [Component API Reference](components.md) for all 48 components.</p>
<p>---</p>
<h2>Data Classes</h2>
<p>| Class | Purpose |</p>
<p>|-------|---------|</p>
<p>| `aiui.Message` | Incoming/outgoing message |</p>
<p>| `aiui.AskUserMessage` | User response to `ask()` |</p>
<p>| `aiui.Step` | Processing step indicator |</p>
<p>| `aiui.BaseDataStore` | Abstract datastore interface |</p>
<p>| `aiui.MemoryDataStore` | In-memory store |</p>
<p>| `aiui.JSONFileDataStore` | Persistent JSON file store |</p>
<p>| `aiui.BaseProvider` | Abstract AI provider interface |</p>
<p>| `aiui.PraisonAIProvider` | PraisonAI provider implementation |</p>
<p>| `aiui.RunEvent` | Streaming event |</p>
<p>| `aiui.RunEventType` | Event type enum |</p>
<p>---</p>
<h2>Feature Protocol</h2>
<p>Register custom features that appear in the dashboard.</p>
<p>| Function | Purpose |</p>
<p>|----------|---------|</p>
<p>| `aiui.register_feature(feature)` | Register a feature |</p>
<p>| `aiui.get_features()` | List all features |</p>
<p>| `aiui.get_feature(name)` | Get a specific feature |</p>
<p>| `aiui.auto_register_defaults()` | Auto-register built-in features |</p></noscript></div>
