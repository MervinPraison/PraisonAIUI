  <div id="root"><noscript><h1>Component API Reference</h1>
<p>Python functions for building dashboard UIs. Each function returns a dict that the frontend renders as a real UI element — **36 components** organized into tiers.</p>
<p>---</p>
<h2>Core Components</h2>
<h3>`aiui.layout(children)`</h3>
<p>Wrap components in a renderable container.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `children` | `Sequence[dict]` | ✅ | List of component dicts |</p>
<p>**Returns:** `dict` with `_components` key — triggers structured rendering in the frontend.</p>
<h3>`aiui.card(title, *, value, footer)`</h3>
<p>A metric/stat card.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `title` | `str` | ✅ | Card header label |</p>
<p>| `value` | `Any` | ❌ | Main display value |</p>
<p>| `footer` | `str` | ❌ | Small text below the value |</p>
<h3>`aiui.columns(children)`</h3>
<p>Arrange components in a responsive grid row.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `children` | `Sequence[dict]` | ✅ | Component dicts to lay out side-by-side |</p>
<h3>`aiui.table(*, headers, rows)`</h3>
<p>A data table.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `headers` | `Sequence[str]` | ✅ | Column header labels |</p>
<p>| `rows` | `Sequence[Sequence[Any]]` | ✅ | Row data arrays |</p>
<h3>`aiui.text(content)`</h3>
<p>A text block.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `content` | `str` | ✅ | Text content |</p>
<h3>`aiui.chart(title, *, data, chart_type)`</h3>
<p>A chart.</p>
<p>| Parameter | Type | Required | Default | Description |</p>
<p>|-----------|------|----------|---------|-------------|</p>
<p>| `title` | `str` | ✅ | — | Chart title |</p>
<p>| `data` | `Sequence[dict]` | ❌ | `[]` | Data points |</p>
<p>| `chart_type` | `str` | ❌ | `"bar"` | `bar`, `line`, or `pie` |</p>
<p>---</p>
<h2>Essential Components</h2>
<h3>`aiui.metric(label, *, value, delta, delta_color)`</h3>
<p>A metric card with optional delta indicator.</p>
<p>| Parameter | Type | Required | Default | Description |</p>
<p>|-----------|------|----------|---------|-------------|</p>
<p>| `label` | `str` | ✅ | — | Metric label |</p>
<p>| `value` | `Any` | ✅ | — | Main metric value |</p>
<p>| `delta` | `str` | ❌ | `None` | Change indicator (e.g. "+5%") |</p>
<p>| `delta_color` | `str` | ❌ | `"normal"` | `"normal"`, `"inverse"`, or `"off"` |</p>
<h3>`aiui.progress_bar(label, *, value, max_value)`</h3>
<p>A progress bar.</p>
<p>| Parameter | Type | Required | Default | Description |</p>
<p>|-----------|------|----------|---------|-------------|</p>
<p>| `label` | `str` | ✅ | — | Label above the bar |</p>
<p>| `value` | `int\|float` | ✅ | — | Current value |</p>
<p>| `max_value` | `int\|float` | ❌ | `100` | Maximum value |</p>
<h3>`aiui.alert(message, *, variant, title)`</h3>
<p>An alert/notification box.</p>
<p>| Parameter | Type | Required | Default | Description |</p>
<p>|-----------|------|----------|---------|-------------|</p>
<p>| `message` | `str` | ✅ | — | Alert body text |</p>
<p>| `variant` | `str` | ❌ | `"info"` | `"info"`, `"success"`, `"warning"`, `"error"` |</p>
<p>| `title` | `str` | ❌ | `None` | Optional bold title |</p>
<h3>`aiui.badge(text, *, variant)`</h3>
<p>An inline badge/tag.</p>
<p>| Parameter | Type | Required | Default | Description |</p>
<p>|-----------|------|----------|---------|-------------|</p>
<p>| `text` | `str` | ✅ | — | Badge label |</p>
<p>| `variant` | `str` | ❌ | `"default"` | `"default"`, `"secondary"`, `"destructive"`, `"outline"` |</p>
<h3>`aiui.separator()`</h3>
<p>A horizontal separator line. No parameters.</p>
<h3>`aiui.tabs(items)`</h3>
<p>A tabbed container.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `items` | `Sequence[dict]` | ✅ | List of `{"label": str, "children": [comp_dicts]}` |</p>
<h3>`aiui.accordion(items)`</h3>
<p>A collapsible accordion.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `items` | `Sequence[dict]` | ✅ | List of `{"title": str, "content": str_or_comp}` |</p>
<h3>`aiui.image_display(src, *, alt, caption, width)`</h3>
<p>An image with optional caption.</p>
<p>| Parameter | Type | Required | Default | Description |</p>
<p>|-----------|------|----------|---------|-------------|</p>
<p>| `src` | `str` | ✅ | — | Image URL or path |</p>
<p>| `alt` | `str` | ❌ | `""` | Alt text |</p>
<p>| `caption` | `str` | ❌ | `None` | Caption below image |</p>
<p>| `width` | `str` | ❌ | `None` | CSS width (e.g. `"300px"`, `"50%"`) |</p>
<h3>`aiui.code_block(code, *, language)`</h3>
<p>A code block with syntax highlighting.</p>
<p>| Parameter | Type | Required | Default | Description |</p>
<p>|-----------|------|----------|---------|-------------|</p>
<p>| `code` | `str` | ✅ | — | Source code text |</p>
<p>| `language` | `str` | ❌ | `"text"` | Language for highlighting |</p>
<h3>`aiui.json_view(data)`</h3>
<p>A formatted JSON viewer.</p>
<p>| Parameter | Type | Required | Description |</p>
<p>|-----------|------|----------|-------------|</p>
<p>| `data` | `Any` | ✅ | Any JSON-serializable data |</p>

<h2>Composition</h2>
<p>Components are designed to compose. Use `columns()` for horizontal layout within a `layout()`:</p>
<h2>Component Count Summary</h2>
<p>| Category | Components | Count |</p>
<p>|----------|-----------|-------|</p>
