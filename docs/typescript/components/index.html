  <div id="root"><noscript><h1>Components</h1>
<p>Built-in React components for PraisonAIUI.</p>
<h2>Layout Components</h2>
<h3>ThreeColumnLayout</h3>
<p>Documentation layout with sidebar and TOC.</p>
<h3>DefaultLayout</h3>
<p>Simple layout for landing pages.</p>
<h2>Slot Components</h2>
<h3>Header</h3>
<h3>Footer</h3>
<h3>DocsSidebar</h3>
<h3>Toc</h3>
<h3>DocContent</h3>
<h2>Styling Components</h2>
<p>All components use semantic CSS classes prefixed with `aiui-`. Style them with your preferred CSS approach:</p>
<p>| Component | CSS Classes |</p>
<p>|-----------|-------------|</p>
<p>| Layouts | `aiui-layout`, `aiui-layout-three-column`, `aiui-layout-header`, `aiui-layout-main` |</p>
<p>| Header | `aiui-header`, `aiui-header-logo`, `aiui-header-nav`, `aiui-header-cta` |</p>
<p>| Footer | `aiui-footer`, `aiui-footer-links` |</p>
<p>| Sidebar | `aiui-sidebar`, `aiui-sidebar-item`, `aiui-sidebar-group` |</p>
<p>| Toc | `aiui-toc`, `aiui-toc-item` |</p>
<p>| Content | `aiui-content`, `aiui-content-body` |</p></noscript></div>
