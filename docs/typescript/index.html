  <div id="root"><noscript><h1>TypeScript SDK Overview</h1>
<p>The TypeScript SDK provides React components and runtime utilities for rendering PraisonAIUI sites.</p>
<h2>Installation</h2>
<h2>Features</h2>
<li>**React Components** - Pre-built slot components</li>
<li>**Next.js Adapter** - Zero-config Next.js integration</li>
<li>**Runtime** - Manifest loading and template resolution</li>
<li>**TypeScript** - Full type definitions</li>
<h2>Quick Start</h2>
<h2>Package Exports</h2>
<p>| Export | Description |</p>
<p>|--------|-------------|</p>
<p>| `praisonaiui` | Main entry, types |</p>
<p>| `praisonaiui/runtime` | Runtime utilities |</p>
<p>| `praisonaiui/next` | Next.js adapter |</p>
<p>| `praisonaiui/components` | React components |</p>
<h2>Next Steps</h2>
<li>[Runtime](runtime.md) - Core runtime utilities</li>
<li>[Next.js Adapter](nextjs.md) - Next.js integration</li>
<li>[Components](components.md) - Built-in components</li></noscript></div>
  <script>
    // AIUI Plugin System — inline bootstrap
    (function () {
      var plugins = [];
      function notify() {
        var root = document.getElementById('root');
        if (!root) return;
        plugins.forEach(function (p) {
          try { if (typeof p.onContentChange === 'function') p.onContentChange(root) }
          catch (e) { console.warn('[AIUI] plugin error:', p.name, e) }
        });
      }
      function observe() {
        var root = document.getElementById('root');
        if (!root) return;
        var t;
        new MutationObserver(function () { clearTimeout(t); t = setTimeout(notify, 200) })
          .observe(root, { childList: true, subtree: true });
      }
      fetch('/plugins/plugins.json').then(function (r) { return r.json() }).then(function (cfg) {
        var names = cfg.plugins || [];
        if (!names.length) return;
        Promise.allSettled(names.map(function (name) {
          return import('/plugins/' + name + '.js').then(function (mod) {
            var p = mod.default || mod; p.name = p.name || name;
            if (typeof p.init === 'function') return Promise.resolve(p.init()).then(function () { plugins.push(p) });
            plugins.push(p);
          }).catch(function (e) { console.warn('[AIUI] failed:', name, e) });
        })).then(function () {
          observe();
          // Two-stage: immediate for fast plugins, delayed for CDN loads (mermaid)
          setTimeout(notify, 300);
          setTimeout(notify, 3000);
          console.debug('[AIUI]', plugins.length, 'plugin(s) active');
        });
      }).catch(function () { });
    })();
  </script>
