<h2>Migrating from MkDocs</h2>
<p>Already using MkDocs? The migration is simple:</p>
<p>| MkDocs | AIUI |</p>
<p>|--------|------|</p>
<p>| `mkdocs.yml` | `aiui.template.yaml` |</p>
<p>| `mkdocs build` → `./site/` | `aiui build --output site` → `./site/` |</p>
<p>| `mkdocs serve` | `aiui serve` |</p>
<p>| `pip install mkdocs-material` | `pip install aiui` |</p>
<p>Your existing `docs/` folder works as-is — just swap the config and build command.</p>
<h3>Migration Steps</h3>
<p>1. Create `aiui.template.yaml` (see example above)</p>
<p>2. Replace `mkdocs build` with `aiui build --output site --minify` in your CI workflow</p>
<p>3. Remove `mkdocs.yml` (optional — keep for reference)</p>
<p>4. Push to `main`</p>
