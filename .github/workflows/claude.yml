name: Claude Assistant

# Triggers:
#   - issues:opened       → lightweight triage (labels + auto-claude for owner)
#   - issues:labeled      → full implementation when `claude` label applied
#   - issues:assigned     → full implementation when issue assigned to Claude
#   - issue_comment       → full implementation when @claude mentioned (issues + PRs)
#   - pull_request_review → full implementation when @claude mentioned in review
#   - pull_request_review_comment → full implementation when @claude mentioned inline
#
# Escalate an issue with the `claude` label OR an @claude comment — not both.
# If both fire within 3 minutes, the comment trigger is skipped (dedupe job).
#
# Focus: CLAUDE only. Copilot and CodeRabbit are GitHub Apps that react to PRs
# automatically — no workflow file needed. auto-pr-comment.yml orchestrates the
# CodeRabbit → Copilot → Claude review chain for PRs.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number for Claude implementation'
        required: true
        type: string

jobs:
  # ================================================================
  # Job 1 — Issue triage (runs on ANY new issue, including external users)
  # Posts welcome comment + triage labels. Auto-adds `claude` for owner issues.
  # ================================================================
  issue-triage:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      !contains(toJSON(github.event.issue.labels), 'claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Generate GitHub App Token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Resolve GitHub token
        id: github-token
        run: |
          if [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Triage and acknowledge issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.github-token.outputs.token }}
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const content = title + ' ' + body;
            const isOwner = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(
              issue.author_association
            );

            const labels = [];

            if (content.includes('feature request') || content.includes('[feature')) {
              labels.push('enhancement');
            } else if (content.includes('bug') || content.includes('error') || content.includes('crash') || content.includes('traceback')) {
              labels.push('bug');
            } else if (content.includes('question') || content.includes('how do i') || content.includes('how to')) {
              labels.push('question');
            }

            if (content.includes('security') || content.includes('cve') || content.includes('vulnerability')) {
              labels.push('security');
            }
            if (content.includes('performance') || content.includes('slow') || content.includes('memory leak')) {
              labels.push('performance');
            }
            if (content.includes('documentation') || content.includes('docs')) {
              labels.push('documentation');
            }
            if (content.includes('typescript') || content.includes('javascript') || content.includes('npm')) {
              labels.push('javascript');
            }
            if (content.includes('frontend') || content.includes('react') || content.includes('vite')) {
              labels.push('frontend');
            }
            if (content.includes('example') || content.includes('yaml')) {
              labels.push('examples');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels
              });
            }

            if (!isOwner) {
              await github.rest.issues.createComment({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: [
                  `👋 Thanks for opening this issue, @${issue.user.login}!`,
                  '',
                  'A maintainer will review this shortly. In the meantime:',
                  '- Make sure you\'ve included steps to reproduce (for bugs)',
                  '- Check [existing issues](https://github.com/MervinPraison/PraisonAIUI/issues) for duplicates',
                  '- Review [AGENTS.md](https://github.com/MervinPraison/PraisonAIUI/blob/main/AGENTS.md) for project conventions',
                  '',
                  '_A maintainer can trigger deeper analysis by commenting `@claude` on this issue._'
                ].join('\n')
              });
            }

            if (isOwner) {
              await github.rest.issues.addLabels({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['claude']
              });
            }

  # ================================================================
  # Job 2 — Full Claude Code implementation
  # Triggers on: labeled `claude`, @claude comments, assignments
  #
  # Dedup: label + @claude comment on the same issue fires two events.
  # Skip the comment trigger when `claude` was labelled within 3 minutes.
  # ================================================================
  claude-dedupe:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
      github.event.action != 'opened' &&
      (github.event.action != 'labeled' || github.event.label.name == 'claude') &&
      (github.event_name != 'issue_comment' || contains(github.event.comment.body, '@claude')) &&
      (
        !contains(github.actor, '[bot]') ||
        github.actor == 'github-actions[bot]' ||
        github.actor == 'praisonai-triage-agent[bot]'
      ) &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'cursor[bot]' &&
      github.actor != 'renovate[bot]'
      )
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: Skip duplicate comment after fresh claude label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('proceed', 'true');
              return;
            }
            if (context.eventName !== 'issue_comment' || context.payload.issue?.pull_request) {
              core.setOutput('proceed', 'true');
              return;
            }
            const issue = context.payload.issue;
            const hasClaude = (issue.labels || []).some(l => l.name === 'claude');
            if (!hasClaude) {
              core.setOutput('proceed', 'true');
              return;
            }
            const events = await github.rest.issues.listEvents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 30,
            });
            const windowMs = 3 * 60 * 1000;
            const recentLabel = events.data.find(e =>
              e.event === 'labeled' &&
              e.label?.name === 'claude' &&
              (Date.now() - new Date(e.created_at).getTime()) < windowMs
            );
            if (recentLabel) {
              core.info('Skipping: claude label was added within 3 minutes — label trigger already handles this issue.');
              core.setOutput('proceed', 'false');
              return;
            }
            core.setOutput('proceed', 'true');

  claude-response:
    needs: claude-dedupe
    env:
      ISSUE_NUMBER_RESOLVED: ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
    if: needs.claude-dedupe.outputs.proceed == 'true'
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Resolve GitHub token
        id: github-token
        run: |
          if [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for Fork PR
        id: check_fork
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.github-token.outputs.token }}
          script: |
            const isPR = context.eventName === 'pull_request' ||
              context.eventName === 'pull_request_review' ||
              context.eventName === 'pull_request_review_comment' ||
              (context.payload.issue && context.payload.issue.pull_request);
            if (isPR) {
              core.setOutput('is_pr_review', 'true');
              const prNumber = context.payload.pull_request
                ? context.payload.pull_request.number
                : context.payload.issue.number;
              core.setOutput('pr_number', String(prNumber));
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              core.setOutput('pr_branch', pr.data.head.ref);
              const headRepo = pr.data.head.repo?.full_name || context.repo.full_name;
              core.setOutput('head_repo', headRepo);

              let mergeState = '';
              try {
                const gql = await github.graphql(
                  `query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) { mergeStateStatus }
                    }
                  }`,
                  { owner: context.repo.owner, repo: context.repo.repo, number: prNumber }
                );
                mergeState = (gql.repository.pullRequest.mergeStateStatus || '').toUpperCase();
              } catch (e) {
                core.warning(`GraphQL mergeStateStatus failed: ${e.message}`);
              }
              if (!mergeState) {
                mergeState = (pr.data.mergeable_state || pr.data.merge_state_status || '').toUpperCase();
              }
              core.setOutput('merge_state', mergeState);

              if (headRepo !== `${context.repo.owner}/${context.repo.repo}`) {
                core.setOutput('is_fork', 'true');
                core.setOutput('clone_url', pr.data.head.repo.clone_url);
                core.setOutput('branch', pr.data.head.ref);
                return;
              }
              core.setOutput('is_fork', 'false');
              return;
            }
            core.setOutput('is_pr_review', 'false');
            core.setOutput('is_fork', 'false');
            core.setOutput('merge_state', '');

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ steps.github-token.outputs.token }}
          ref: ${{ steps.check_fork.outputs.is_pr_review == 'true' && format('refs/pull/{0}/head', steps.check_fork.outputs.pr_number) || github.ref }}

      - name: Checkout PR branch for edits
        if: steps.check_fork.outputs.is_pr_review == 'true' && steps.check_fork.outputs.is_fork != 'true'
        env:
          PR_BRANCH: ${{ steps.check_fork.outputs.pr_branch }}
        run: |
          git checkout "${PR_BRANCH}"
          git config --local user.name "MervinPraison"
          git config --local user.email "454862+MervinPraison@users.noreply.github.com"
          echo "On branch: $(git branch --show-current)"

      - name: Fetch PR branch and Setup Remote
        if: steps.check_fork.outputs.is_pr_review == 'true' && steps.check_fork.outputs.is_fork == 'true'
        env:
          PR_BRANCH: ${{ steps.check_fork.outputs.pr_branch }}
        run: |
          git fetch origin pull/${{ steps.check_fork.outputs.pr_number }}/head:"${PR_BRANCH}"
          git checkout "${PR_BRANCH}"
          git remote set-url origin file://$(pwd)

      - name: Run Claude PR final review
        if: steps.check_fork.outputs.is_pr_review == 'true'
        uses: anthropics/claude-code-action@beta
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        with:
          allowed_bots: 'praisonai-triage-agent[bot]'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.github-token.outputs.token }}
          model: claude-opus-4-8
          trigger_phrase: "@claude"
          timeout_minutes: "30"
          direct_prompt: |
            ${{ steps.check_fork.outputs.is_fork == 'true' && 'CRITICAL: FORK PR — comment only, do not push.\n\n' || 'PR on MervinPraison/PraisonAIUI — SAME REPO, NOT A FORK. You HAVE push permission to this branch. NEVER say this is a fork.\n\n' }}
            ${{ steps.check_fork.outputs.is_fork != 'true' && steps.check_fork.outputs.merge_state == 'DIRTY' && format('PRIORITY — RESOLVE MERGE CONFLICTS (branch: {0}, PR #{1}):\n- DO NOT create a new branch or PR\n- git fetch origin main && git rebase origin/main\n- Resolve conflicts: keep this PR intent, merge in main newer logic\n- git add -A && git rebase --continue (repeat until done)\n- git push --force-with-lease origin {0}\n- Run targeted pytest/ruff on changed paths\n- Comment files resolved and what you skipped\n- Only after conflicts are resolved, proceed with review phases below if still needed\n\n', steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.pr_number) || '' }}
            ${{ steps.check_fork.outputs.merge_state != 'DIRTY' && format('CONTEXT: PR #{0} on branch {1}. merge_state={2}.\n\n', steps.check_fork.outputs.pr_number, steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.merge_state) || '' }}
            You are the Lead Engineer doing FINAL review on this open PR in MervinPraison/PraisonAIUI.
            Read ALL reviewer comments (CodeRabbit, Gemini, Qodo, Copilot, human). Follow AGENTS.md.
            SCOPE: src/praisonaiui, src/frontend, tests, docs only.

            **Phase 1 — Review** architecture, security, tests, backward compat, import-time budget.
            **Phase 2 — FIX (mandatory)** implement every VALID issue on THIS branch. Push commits before Phase 3.
            Do NOT ask the author to fix. Do NOT open a new PR. Do NOT claim fork restrictions unless is_fork is true.
            **Phase 3 — Verdict** approve only after fixes are pushed and tests pass; else request changes with specifics.

            git config --global user.name "MervinPraison"
            git config --global user.email "454862+MervinPraison@users.noreply.github.com"
            gh auth setup-git
            git status
            git branch --show-current
          allowed_tools: |
            Bash(git:*)
            Bash(python:*)
            Bash(pip:*)
            Bash(pytest:*)
            Bash(ruff:*)
            Bash(gh:*)
            Bash(npm:*)
            View
            GlobTool
            GrepTool
            BatchTool
            Edit
            Replace

      - name: Run Claude Code Action
        if: steps.check_fork.outputs.is_pr_review != 'true'
        uses: anthropics/claude-code-action@beta
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        with:
          allowed_bots: 'praisonai-triage-agent[bot]'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.github-token.outputs.token }}
          model: claude-opus-4-8
          mode: ${{ github.event_name == 'workflow_dispatch' && 'agent' || 'tag' }}
          trigger_phrase: "@claude"
          label_trigger: "claude"
          timeout_minutes: "30"
          direct_prompt: |
            ${{ steps.check_fork.outputs.is_fork == 'true' && 'CRITICAL: THIS IS A PULL REQUEST FROM A FORK. YOU DO NOT HAVE PUSH PERMISSIONS TO THIS REPOSITORY. ONLY READ FILES, VALIDATE CODE, AND PROVIDE YOUR COMMENTS/FEEDBACK DIRECTLY IN THIS PR VIA COMMENTS. DO NOT ATTEMPT TO PUSH OR CREATE PULL REQUESTS.\n\n' || 'NOTE: The branch is under MervinPraison/PraisonAIUI (not a fork). You are able to make modifications and push directly to this branch.\n\n' }}
            You are implementing changes in **MervinPraison/PraisonAIUI** (YAML-driven server-driven UI with agentic chat).
            Follow `AGENTS.md` at the repository root. If a conflict arises between this prompt and `AGENTS.md`, `AGENTS.md` wins.

            ═══════════════════════════════════════════════════════════════
            STEP 0 — GIT & GITHUB CLI
            ═══════════════════════════════════════════════════════════════
            git config --global user.name "MervinPraison"
            git config --global user.email "454862+MervinPraison@users.noreply.github.com"
            gh auth setup-git

            ═══════════════════════════════════════════════════════════════
            STEP 1 — READ GUIDELINES
            ═══════════════════════════════════════════════════════════════
            Read `AGENTS.md` and any `docs/principles.md`. Key invariants:
              • Cold import of `praisonaiui` must stay under 200 ms; module count must not grow.
              • Heavy / optional deps (`mcp`, `langchain`, `llama_index`, `semantic_kernel`,
                `slack_sdk`, `discord.py`, `botbuilder.core`, `openai`, `anthropic`, `mistralai`,
                `google.generativeai`) must be **lazy-imported** — never eager.
              • Public API is verb-first. New classes in `src/praisonaiui/message.py` ending
                in `Message` with a verb prefix (Ask*, Do*, Request*, …) are forbidden —
                use a module-level `async def` verb helper instead (see `prompt`, `error`).
              • Deprecations must emit a runtime `warnings.warn(..., DeprecationWarning, stacklevel=2)`
                on first access, not only in the docstring.
              • Deterministic serialisation in anything reaching the wire (sorted keys, stable field
                order). See existing `to_dict` patterns.
              • Multi-agent + async safe: no global mutable state without a lock.

            ═══════════════════════════════════════════════════════════════
            STEP 2 — ARCHITECTURE VALIDATION & ROUTING (MANDATORY before any code)
            ═══════════════════════════════════════════════════════════════
            Answer these questions inline in your response, then proceed only if you pass:

            ROUTING:
              1. **Core aiui** (`src/praisonaiui/`)      — protocols, message types, server, features.
              2. **Features** (`src/praisonaiui/features/`) — opt-in capabilities (MCP, platforms, lifecycle, audio, auth, sharing, etc.).
              3. **UI builders** (`src/praisonaiui/ui.py`) — declarative component helpers.
              4. **Frontend** (`src/frontend/`)            — React components / stores / SSE handlers.
              5. **Tests** (`tests/unit/`, `tests/integration/`) — new features require both smoke and real-agentic tests.
              6. **Docs** (`docs/`)                        — canonical name per feature, migration table for renames.

            EXTERNAL REPOS (do NOT edit from within this repo — route the work to the right place and stop):
              • Core SDK: `MervinPraison/PraisonAI` (`praisonaiagents`, `praisonai`) — agent runtime.
              • Tools: `MervinPraison/PraisonAI-Tools` — tool implementations.
              • Docs site: `MervinPraison/PraisonAIDocs` — product docs.
            If the requested change belongs in an external repo, comment on the issue explaining
            where it should live and DO NOT open a PR in this repo.

            CONCEPTUAL CHECKS (if ANY fails — add a comment, do NOT open a PR):
              • Does it duplicate an existing public symbol in `src/praisonaiui/__init__.py`?
              • Does it add new class-first message types (`class Ask*Message`, `class *Message`
                with a verb in the name)? → Use a verb-first helper instead.
              • Does it add a new hard dependency to `pyproject.toml` `[project] dependencies`?
                → Move to `[project.optional-dependencies]` and wrap imports lazily.
              • Does it break backward compat (rename, signature change, removal)? → Add
                a deprecation alias that emits `DeprecationWarning`; never hard-remove before the
                documented removal version (e.g. `0.5.0`).

            ═══════════════════════════════════════════════════════════════
            STEP 3 — IMPLEMENT
            ═══════════════════════════════════════════════════════════════
            Single branch for the whole flow (reuse the same name in STEP 5):
              BRANCH="claude/issue-${{ env.ISSUE_NUMBER_RESOLVED }}-$(date +%Y%m%d-%H%M%S)"
              git checkout -b "$BRANCH"

            Make minimal, focused changes:
              • Stay within the files listed in the issue's "Scope" / "Files to change" section.
              • Prefer extending existing modules over adding new ones.
              • No emojis, no comments, no markdown except where the user asked for it.
              • Python ≥ 3.10 style (`list[...]` not `List[...]`, `X | None` not `Optional[X]`).

            ═══════════════════════════════════════════════════════════════
            STEP 4 — TEST / VERIFY
            ═══════════════════════════════════════════════════════════════
            Run these targeted checks (NOT the full suite):

              # 1. Lint on only the files you changed:
              CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '\.py$' | tr '\n' ' ')
              [ -n "$CHANGED" ] && ruff check $CHANGED

              # 2. Unit tests for the module(s) you touched:
              pytest tests/unit/<your_new_test_file>.py -v --tb=short

              # 3. Import-time invariant (MUST stay under 200 ms cold):
              python -c "import time, sys; t=time.time(); import praisonaiui; dt=(time.time()-t)*1000; heavy=[m for m in sys.modules if any(h in m for h in ['langchain','llama_index','mcp','slack','discord','botbuilder','openai.','anthropic.','mistralai','google.generativeai'])]; print(f'{dt:.1f}ms modules={len(sys.modules)} leaked={heavy}'); assert heavy == [], f'Heavy deps leaked: {heavy}'"

            If anything fails, fix the root cause (never skip, xfail, or delete the test).

            ═══════════════════════════════════════════════════════════════
            STEP 5 — COMMIT, PUSH, OPEN PR (MANDATORY if you produced commits)
            ═══════════════════════════════════════════════════════════════
              git add -A
              git commit -m "feat: <short summary> (fixes #${{ env.ISSUE_NUMBER_RESOLVED }})"
              git push -u origin "$BRANCH"
              REPO="${{ github.repository }}"
              COUNT=$(gh pr list --repo "$REPO" --head "$BRANCH" --json number --jq 'length')
              if [ "$COUNT" -gt 0 ]; then
                gh pr list --repo "$REPO" --head "$BRANCH" --json url --jq '.[0].url'
              else
                gh pr create --repo "$REPO" --base main --head "$BRANCH" \
                  --title "feat: <short title>" \
                  --body "Fixes #${{ env.ISSUE_NUMBER_RESOLVED }}

            ## Summary

            <what changed in one paragraph>

            ## Acceptance criteria

            <copy from the issue; tick boxes only with commit SHA + file path evidence>

            ## Test evidence

            \`\`\`
            <paste pytest output>
            \`\`\`
            "
              fi

            CRITICAL: Do NOT stop after `git push`. You MUST complete `gh pr create` (or print the
            existing PR URL from the step above) and post that URL on the issue. Never ask a
            human to open the PR manually.

            ═══════════════════════════════════════════════════════════════
            STEP 6 — RESPOND TO REVIEW FEEDBACK (if this run was triggered by a review comment)
            ═══════════════════════════════════════════════════════════════
            If you were invoked by a PR review comment, you are the Lead Engineer for this PR:
              • Read ALL reviewer comments in chronological order (CodeRabbit → Copilot → human).
              • Fix every VALID issue by pushing commits to THIS branch (do NOT open a new PR).
              • Reply with a summary of which comments you addressed, which you disagreed with (and why).
              • Never ship a fix that removes/weakens a test.

          allowed_tools: |
            Bash(git:*)
            Bash(python:*)
            Bash(pip:*)
            Bash(pytest:*)
            Bash(ruff:*)
            Bash(gh:*)
            Bash(npm:*)
            Bash(npx:*)
            Bash(python -m pytest:*)
            Bash(python -m pip:*)
            Bash(python -m ruff:*)
            View
            GlobTool
            GrepTool
            BatchTool
            Edit
            Replace
            mcp__github__get_issue
            mcp__github__get_issue_comments
            mcp__github__update_issue
