name: PyPI Release

# Requires GitHub Environment "pypi" with required reviewers.
# Secrets: PYPI_TOKEN (or PYPI_API_TOKEN), GH_TOKEN

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type for aiui'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Preview versions and steps without publishing or pushing'
        required: false
        default: false
        type: boolean
      version:
        description: 'Override version (empty = auto bump from pyproject.toml)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    env:
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN || secrets.PYPI_API_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      PACKAGE: aiui
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4

      - name: Configure git
        run: |
          git config user.name "MervinPraison"
          git config user.email "454862+MervinPraison@users.noreply.github.com"
          gh auth setup-git

      - name: Compute release version
        id: versions
        env:
          BUMP: ${{ inputs.bump }}
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          python <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          SEMVER = re.compile(r"^\d+\.\d+\.\d+$")
          bump = os.environ["BUMP"]
          override = os.environ.get("VERSION_OVERRIDE", "").strip()

          def bump_version(version: str) -> str:
              parts = version.split(".")
              if len(parts) != 3:
                  print(f"Invalid version: {version}", file=sys.stderr)
                  sys.exit(1)
              maj, min_, patch = (int(parts[0]), int(parts[1]), int(parts[2]))
              if bump == "major":
                  return f"{maj + 1}.0.0"
              if bump == "minor":
                  return f"{maj}.{min_ + 1}.0"
              return f"{maj}.{min_}.{patch + 1}"

          pyproject = Path("pyproject.toml")
          content = pyproject.read_text()
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              print("Could not read version from pyproject.toml", file=sys.stderr)
              sys.exit(1)
          current = match.group(1)
          if not SEMVER.match(current):
              print(f"Invalid current version: {current}", file=sys.stderr)
              sys.exit(1)
          if override:
              if not SEMVER.match(override):
                  print(f"Invalid version override: {override}", file=sys.stderr)
                  sys.exit(1)
              new_version = override
          else:
              new_version = bump_version(current)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"current_version={current}\n")
              fh.write(f"new_version={new_version}\n")
          print(f"aiui: {current} -> {new_version}")
          PY

      - name: Dry run summary
        if: inputs.dry_run
        run: |
          echo "Dry run — no publish, commit, or push."
          echo "Package:  ${{ env.PACKAGE }}"
          echo "Version:  ${{ steps.versions.outputs.current_version }} -> ${{ steps.versions.outputs.new_version }}"
          echo "Would: bump pyproject.toml + __version__.py, uv publish, commit, tag, GitHub release"

      - name: Bump version files
        if: inputs.dry_run != true
        env:
          CURRENT: ${{ steps.versions.outputs.current_version }}
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          set -euo pipefail
          python <<'PY'
          import os
          import re
          from pathlib import Path

          current = os.environ["CURRENT"]
          new = os.environ["NEW_VERSION"]

          pyproject = Path("pyproject.toml")
          content = pyproject.read_text()
          pyproject.write_text(content.replace(f'version = "{current}"', f'version = "{new}"', 1))

          version_py = Path("src/praisonaiui/__version__.py")
          vcontent = version_py.read_text()
          version_py.write_text(re.sub(
              r'__version__ = "[^"]+"',
              f'__version__ = "{new}"',
              vcontent,
              count=1,
          ))
          PY

      - name: Publish aiui to PyPI
        if: inputs.dry_run != true
        run: |
          set -euo pipefail
          rm -rf dist
          uv lock
          uv build
          uv publish

      - name: Wait for aiui on PyPI
        if: inputs.dry_run != true
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.new_version }}"
          MAX_WAIT=600
          INTERVAL=30
          START=$(date +%s)

          while true; do
            if curl -fsSL "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json" >/dev/null; then
              echo "✅ ${PACKAGE}==${VERSION} is available on PyPI"
              exit 0
            fi
            ELAPSED=$(( $(date +%s) - START ))
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "❌ Timeout waiting for ${PACKAGE}==${VERSION} on PyPI"
              exit 1
            fi
            echo "⏳ Waiting for ${PACKAGE}==${VERSION} ($(( MAX_WAIT - ELAPSED ))s remaining...)"
            sleep "$INTERVAL"
          done

      - name: Commit, tag, and release
        if: inputs.dry_run != true
        env:
          VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git add pyproject.toml uv.lock src/praisonaiui/__version__.py
          git diff --cached --quiet && { echo "No version files to commit"; exit 0; }
          git commit -m "Release ${TAG}"
          git tag -f "${TAG}"
          git pull --rebase origin main
          git tag -f "${TAG}"
          git push origin main
          git push --tags -f
          gh release create "${TAG}" \
            --title "PraisonAIUI ${TAG}" \
            --notes "Release ${TAG}" \
            --latest

      - name: Verify release
        if: inputs.dry_run != true
        run: echo "✅ ${{ env.PACKAGE }}==${{ steps.versions.outputs.new_version }}"
